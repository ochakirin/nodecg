<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手書き回答ボード</title>
    <style>
        html, body { overscroll-behavior-y: none; -webkit-overflow-scrolling: touch; }
        body { font-family: sans-serif; padding: 20px 15px; background: linear-gradient(135deg, #0d47a1 0%, #0a2540 100%); color: #ffffff; text-align: center; margin: 0 auto; max-width: 600px; touch-action: none; box-sizing: border-box; }
        
        .header-text { font-size: 22px; font-weight: bold; color: #ffffff; margin-bottom: 15px; background: rgba(255, 255, 255, 0.15); padding: 12px; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .theme-box { background: rgba(255, 152, 0, 0.2); border: 2px dashed #ff9800; color: #fff3e0; font-size: 18px; font-weight: bold; padding: 12px; margin-bottom: 15px; border-radius: 6px; display: none; }
        canvas { display: block; background: #1565c0; border: 4px solid #ffffff; border-radius: 12px; width: 100%; height: 260px; cursor: crosshair; touch-action: none; box-shadow: 0 6px 20px rgba(0,0,0,0.4); margin: 0 auto; }
        
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 20px; width: 100%; }
        button { flex: 1; padding: 18px; font-size: 20px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; transition: all 0.1s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        button:active { transform: scale(0.95); }
        .btn-clear { background: #546e7a; border: 1px solid rgba(255,255,255,0.1); }
        .btn-submit { background: #ff9800; color: #fff; }
        .btn-submit.success { background: #4CAF50; }
    </style>
</head>
<body>

    <div class="header-text" id="display-name">システム接続中...</div>
    <div class="theme-box" id="theme-display"></div>
    <canvas id="draw-pad" width="600" height="300"></canvas>

    <div class="btn-group">
        <button class="btn-clear" id="btn-clear">🗑️ 消す</button>
        <button class="btn-submit" id="btn-submit">🚀 送信</button>
    </div>

    <script>
        const gameRep = nodecg.Replicant('owarematenState', {
            defaultValue: { answers: Array(14).fill(''), isOpen: Array(14).fill(false), names: Array(14).fill(''), isCorrect: Array(14).fill(false), activeTeam: 0, totalScores: [0, 0], theme: '' }
        });

        const canvas = document.getElementById('draw-pad');
        const ctx = canvas.getContext('2d');
        const displayName = document.getElementById('display-name');
        const themeDisplay = document.getElementById('theme-display');

        const urlParams = new URLSearchParams(window.location.search);
        const playerId = parseInt(urlParams.get('player'), 10);

        gameRep.on('change', (newVal) => {
            if (!newVal) return;
            
            if (!isNaN(playerId) && playerId >= 0 && playerId <= 13) {
                // 🔴 役割名（リーダー or 回答者）を計算
                const localIdx = playerId % 7;
                const roleName = localIdx === 0 ? "👑 リーダー" : `回答者${localIdx}`;

                if (newVal.names && newVal.names[playerId] && newVal.names[playerId].trim() !== '') {
                    displayName.innerText = `【 ${newVal.names[playerId]} 】さんのボード`;
                } else {
                    displayName.innerText = `【 ${roleName} 】のボード`;
                }
            } else {
                displayName.innerText = `プレイヤーIDが不正です`;
            }

            if (newVal.theme && newVal.theme.trim() !== '') {
                themeDisplay.innerText = `📝 お題：${newVal.theme}`;
                themeDisplay.style.display = 'block';
            } else {
                themeDisplay.style.display = 'none';
            }
        });

        function clearCanvas() {
            ctx.fillStyle = "#1565c0"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        clearCanvas();

        let isDrawing = false;
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            if (e.type.includes('touch')) {
                if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; } 
                else if (e.changedTouches && e.changedTouches.length > 0) { clientX = e.changedTouches[0].clientX; clientY = e.changedTouches[0].clientY; } 
                else { clientX = 0; clientY = 0; }
            } else { clientX = e.clientX; clientY = e.clientY; }
            return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
        }

        function startDraw(e) { 
            if (e.cancelable) e.preventDefault(); 
            isDrawing = true; 
            const pos = getPos(e); 
            ctx.beginPath(); ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 8; ctx.lineCap = "round"; ctx.lineJoin = "round"; 
            ctx.moveTo(pos.x, pos.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
        }
        function draw(e) { 
            if (!isDrawing) return; 
            if (e.cancelable) e.preventDefault(); 
            const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); 
        }
        function stopDraw(e) { 
            if (e.type !== 'mouseleave' && e.cancelable) e.preventDefault(); 
            isDrawing = false; ctx.closePath(); 
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);
        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDraw, {passive: false});

        document.getElementById('btn-clear').addEventListener('click', clearCanvas);

        document.getElementById('btn-submit').addEventListener('click', () => {
            if (isNaN(playerId)) return alert("IDエラー：送信できません");
            const imageData = canvas.toDataURL('image/png');
            
            let state = gameRep.value;
            if (!state) { state = { answers: Array(14).fill(''), isOpen: Array(14).fill(false), names: Array(14).fill(''), isCorrect: Array(14).fill(false), activeTeam: 0, totalScores: [0, 0], theme: '' }; } 
            else { state = JSON.parse(JSON.stringify(state)); }
            
            if (!state.answers) state.answers = Array(14).fill('');
            if (!state.isOpen) state.isOpen = Array(14).fill(false);
            
            state.answers[playerId] = imageData;
            state.isOpen[playerId] = false; 
            gameRep.value = state;

            const btn = document.getElementById('btn-submit');
            btn.innerText = "✅ 送信完了！";
            btn.classList.add('success');
            setTimeout(() => { btn.innerText = "🚀 送信 (再提出可)"; btn.classList.remove('success'); }, 3000);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手書き回答ボード</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #eceff1; text-align: center; margin: 0; touch-action: none; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .header-text { font-size: 20px; font-weight: bold; color: #37474f; margin-bottom: 10px; }
        select { width: 100%; max-width: 600px; padding: 12px; font-size: 18px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #ccc; font-weight: bold; background: white; }
        /* キャンバス（手書きエリア）の設定 */
        canvas { background: white; border: 3px solid #37474f; border-radius: 8px; width: 100%; max-width: 600px; height: 300px; cursor: crosshair; touch-action: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 20px; width: 100%; max-width: 600px; }
        button { flex: 1; padding: 18px; font-size: 20px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        .btn-clear { background: #607d8b; }
        .btn-submit { background: #e91e63; }
        .btn-submit.success { background: #4CAF50; }
    </style>
</head>
<body>

    <div class="header-text" id="display-name">あなたの回答枠を選んでください</div>
    
    <select id="player-select">
        <option value="0">1人目 の回答枠</option>
        <option value="1">2人目 の回答枠</option>
        <option value="2">3人目 の回答枠</option>
        <option value="3">4人目 の回答枠</option>
        <option value="4">5人目 の回答枠</option>
        <option value="5">6人目 の回答枠</option>
        <option value="6">7人目 の回答枠</option>
    </select>

    <canvas id="draw-pad" width="600" height="300"></canvas>

    <div class="btn-group">
        <button class="btn-clear" id="btn-clear">🗑️ 消す</button>
        <button class="btn-submit" id="btn-submit">🚀 送信</button>
    </div>

    <script>
        const gameRep = nodecg.Replicant('owarematenState', {
            defaultValue: { answers: ['', '', '', '', '', '', ''], isOpen: [false, false, false, false, false, false, false] }
        });

        const canvas = document.getElementById('draw-pad');
        const ctx = canvas.getContext('2d');
        const playerSelect = document.getElementById('player-select');
        const displayName = document.getElementById('display-name');

        // 🔴 URLパラメータから ?id=〇 を取得し、自動選択＆ロックする処理
        const urlParams = new URLSearchParams(window.location.search);
        const playerId = urlParams.get('id');

        if (playerId !== null && playerId >= 0 && playerId <= 6) {
            playerSelect.value = playerId;
            playerSelect.disabled = true; // 他の人の枠を選べないようにロック
            playerSelect.style.display = 'none'; // 邪魔なので非表示にする
            displayName.innerText = `あなたは【${parseInt(playerId) + 1}人目】です`;
        }

        // 背景を白で塗りつぶす
        function clearCanvas() {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "black";
            ctx.lineWidth = 8;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
        }
        clearCanvas();

        // 描画ロジック（スマホのタッチ対応）
        let isDrawing = false;
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function startDraw(e) { e.preventDefault(); isDrawing = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
        function draw(e) { if (!isDrawing) return; e.preventDefault(); const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
        function stopDraw(e) { e.preventDefault(); isDrawing = false; ctx.closePath(); }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);

        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDraw, {passive: false});

        document.getElementById('btn-clear').addEventListener('click', clearCanvas);

        // 送信ボタン
        document.getElementById('btn-submit').addEventListener('click', () => {
            const playerIndex = parseInt(playerSelect.value);
            const imageData = canvas.toDataURL('image/png'); // 画像を文字データ化
            
            const currentState = gameRep.value;
            currentState.answers[playerIndex] = imageData;
            currentState.isOpen[playerIndex] = false; // 送信時は伏せた状態
            gameRep.value = currentState;

            // 送信完了の演出
            const btn = document.getElementById('btn-submit');
            btn.innerText = "✅ 送信完了！";
            btn.classList.add('success');
            setTimeout(() => { 
                btn.innerText = "🚀 送信 (再提出可)"; 
                btn.classList.remove('success'); 
            }, 3000);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手書き回答ボード</title>
    <style>
        body { font-family: sans-serif; padding: 20px 15px; background: linear-gradient(135deg, #0d47a1 0%, #0a2540 100%); color: #ffffff; text-align: center; margin: 0 auto; max-width: 600px; touch-action: none; box-sizing: border-box; }
        .header-text { font-size: 20px; font-weight: bold; color: #ffffff; margin-bottom: 15px; background: rgba(255, 255, 255, 0.15); padding: 10px; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        #player-select { width: 100%; padding: 12px; font-size: 16px; margin-bottom: 15px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.3); font-weight: bold; background: #ffffff; color: #333333; display: none; }
        
        canvas { display: block; background: #1565c0; border: 4px solid #ffffff; border-radius: 12px; width: 100%; height: 260px; cursor: crosshair; touch-action: none; box-shadow: 0 6px 20px rgba(0,0,0,0.4); margin: 0 auto; }
        
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 15px; width: 100%; }
        button { flex: 1; padding: 16px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; transition: all 0.1s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        button:active { transform: scale(0.95); }
        .btn-clear { background: #546e7a; border: 1px solid rgba(255,255,255,0.1); }
        .btn-submit { background: #ff9800; color: #fff; }
        .btn-submit.success { background: #4CAF50; }

        #preview-section { margin-top: 25px; padding-top: 15px; border-top: 2px dashed rgba(255,255,255,0.2); text-align: left; display: none; }
        .preview-title { font-size: 14px; font-weight: bold; color: #b0bec5; margin-bottom: 10px; }
        .preview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        @media (max-width: 480px) { .preview-grid { grid-template-columns: repeat(2, 1fr); } }
        .preview-box { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; padding: 4px; text-align: center; }
        .preview-box .p-name { font-size: 11px; font-weight: bold; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: rgba(0,0,0,0.3); padding: 2px; border-radius: 4px; margin-bottom: 5px; }
        .preview-box img { width: 100%; height: 45px; object-fit: contain; background: #1565c0; display: block; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        .preview-box .p-status { font-size: 11px; color: #b0bec5; padding: 14px 0; font-style: italic; }
    </style>
</head>
<body>

    <div class="header-text" id="display-name">読み込み中...</div>
    
    <select id="player-select">
        <option value="0">[A] 👑 リーダー</option>
        <option value="1">[A] 回答者1</option>
        <option value="2">[A] 回答者2</option>
        <option value="3">[A] 回答者3</option>
        <option value="4">[A] 回答者4</option>
        <option value="5">[A] 回答者5</option>
        <option value="6">[A] 回答者6</option>
        <option value="7">[B] 👑 リーダー</option>
        <option value="8">[B] 回答者1</option>
        <option value="9">[B] 回答者2</option>
        <option value="10">[B] 回答者3</option>
        <option value="11">[B] 回答者4</option>
        <option value="12">[B] 回答者5</option>
        <option value="13">[B] 回答者6</option>
    </select>

    <canvas id="draw-pad" width="600" height="300"></canvas>

    <div class="btn-group">
        <button class="btn-clear" id="btn-clear">🗑️ 消す</button>
        <button class="btn-submit" id="btn-submit">🚀 送信</button>
    </div>

    <div class="preview-section" id="preview-section">
        <div class="preview-title">📊 チームA 回答状況</div>
        <div class="preview-grid" id="preview-grid-a"></div>
        <div class="preview-title" style="margin-top:10px;">📊 チームB 回答状況</div>
        <div class="preview-grid" id="preview-grid-b"></div>
    </div>

    <script>
        const gameRep = nodecg.Replicant('owarematenState', {
            defaultValue: { answers: Array(14).fill(''), isOpen: Array(14).fill(false), names: Array(14).fill('') }
        });

        const canvas = document.getElementById('draw-pad');
        const ctx = canvas.getContext('2d');
        const playerSelect = document.getElementById('player-select');
        const displayName = document.getElementById('display-name');
        const previewSection = document.getElementById('preview-section');
        const previewGridA = document.getElementById('preview-grid-a');
        const previewGridB = document.getElementById('preview-grid-b');

        const urlParams = new URLSearchParams(window.location.search);
        const playerId = parseInt(urlParams.get('player'), 10);
        const isStandalone = !isNaN(playerId) && playerId >= 0 && playerId <= 13;

        if (isStandalone) {
            playerSelect.style.display = 'none';
            previewSection.style.display = 'none';
        } else {
            playerSelect.style.display = 'block'; 
            previewSection.style.display = 'block'; 
            displayName.innerText = `手書きボード (ダッシュボード入力用)`;
        }

        gameRep.on('change', (newVal) => {
            if (!newVal) return;
            
            if (isStandalone && newVal.names) {
                const targetName = newVal.names[playerId];
                const localIdx = playerId % 7;
                const roleName = localIdx === 0 ? "👑 リーダー" : `回答者${localIdx}`;

                if (targetName && targetName.trim() !== '') {
                    displayName.innerText = `【 ${targetName} 】さんのボード`;
                } else {
                    displayName.innerText = `【 ${roleName} 】のボード`;
                }
            }

            if (!isStandalone) {
                previewGridA.innerHTML = '';
                previewGridB.innerHTML = '';
                for (let i = 0; i < 14; i++) {
                    const box = document.createElement('div');
                    box.className = 'preview-box';
                    const localIdx = i % 7;
                    const roleName = localIdx === 0 ? "👑 リーダー" : `回答者${localIdx}`;
                    const pName = (newVal.names && newVal.names[i] && newVal.names[i].trim() !== '') ? newVal.names[i] : roleName;
                    
                    if (newVal.answers && newVal.answers[i] !== '') {
                        box.innerHTML = `<div class="p-name">${pName}</div><img src="${newVal.answers[i]}">`;
                    } else {
                        box.innerHTML = `<div class="p-name">${pName}</div><div class="p-status">考え中...</div>`;
                    }
                    if (i < 7) previewGridA.appendChild(box);
                    else previewGridB.appendChild(box);
                }
            }
        });

        function clearCanvas() {
            // 🔴 背景を透明にする
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        clearCanvas();

        let isDrawing = false;
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function startDraw(e) { 
            e.preventDefault(); 
            isDrawing = true; 
            const pos = getPos(e); 
            ctx.beginPath(); 
            ctx.strokeStyle = "#ffffff"; 
            ctx.lineWidth = 8;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.moveTo(pos.x, pos.y); 
        }

        function draw(e) { 
            if (!isDrawing) return; 
            e.preventDefault(); 
            const pos = getPos(e); 
            ctx.lineTo(pos.x, pos.y); 
            ctx.stroke(); 
        }

        function stopDraw(e) { 
            e.preventDefault(); 
            isDrawing = false; 
            ctx.closePath(); 
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);
        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDraw, {passive: false});

        document.getElementById('btn-clear').addEventListener('click', clearCanvas);

        document.getElementById('btn-submit').addEventListener('click', () => {
            const targetIndex = isStandalone ? playerId : parseInt(playerSelect.value, 10);
            const imageData = canvas.toDataURL('image/png');
            
            let state = gameRep.value;
            if (!state) { state = { answers: Array(14).fill(''), isOpen: Array(14).fill(false), names: Array(14).fill('') }; }
            else { state = JSON.parse(JSON.stringify(state)); }

            if (!state.answers) state.answers = Array(14).fill('');
            if (!state.isOpen) state.isOpen = Array(14).fill(false);

            state.answers[targetIndex] = imageData;
            state.isOpen[targetIndex] = false; 
            gameRep.value = state;

            const btn = document.getElementById('btn-submit');
            btn.innerText = "✅ 送信完了！";
            btn.classList.add('success');
            setTimeout(() => { 
                btn.innerText = "🚀 送信 (再提出可)"; 
                btn.classList.remove('success'); 
            }, 3000);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: sans-serif; padding: 10px; background: #eceff1; text-align: center; margin: 0; touch-action: none; }
        select { width: 100%; padding: 10px; font-size: 16px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ccc; font-weight: bold; }
        /* キャンバス（手書きエリア）の設定 */
        canvas { background: white; border: 2px solid #37474f; border-radius: 8px; width: 100%; max-width: 600px; height: 300px; cursor: crosshair; touch-action: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; max-width: 600px; margin-left: auto; margin-right: auto; }
        button { flex: 1; padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; }
        .btn-clear { background: #607d8b; }
        .btn-submit { background: #e91e63; }
        .btn-submit:active { background: #c2185b; }
    </style>
</head>
<body>

    <select id="player-select">
        <option value="0">1人目 の回答枠</option>
        <option value="1">2人目 の回答枠</option>
        <option value="2">3人目 の回答枠</option>
        <option value="3">4人目 の回答枠</option>
        <option value="4">5人目 の回答枠</option>
        <option value="5">6人目 の回答枠</option>
        <option value="6">7人目 の回答枠</option>
    </select>

    <canvas id="draw-pad" width="600" height="300"></canvas>

    <div class="btn-group">
        <button class="btn-clear" id="btn-clear">🗑️ 消す</button>
        <button class="btn-submit" id="btn-submit">🚀 送信</button>
    </div>

    <script>
        // 全員の回答(Base64画像)とオープン状態を管理するReplicant
        const gameRep = nodecg.Replicant('owarematenState', {
            defaultValue: {
                answers: ['', '', '', '', '', '', ''],
                isOpen: [false, false, false, false, false, false, false]
            }
        });

        const canvas = document.getElementById('draw-pad');
        const ctx = canvas.getContext('2d');
        const playerSelect = document.getElementById('player-select');
        let isDrawing = false;

        // 背景を白で塗りつぶす（透過PNGだと配信画面で見えなくなるため）
        function clearCanvas() {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "black";
            ctx.lineWidth = 6;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
        }
        clearCanvas();

        // 描画ロジック（マウス＆タッチ対応）
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function startDraw(e) { e.preventDefault(); isDrawing = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
        function draw(e) { if (!isDrawing) return; e.preventDefault(); const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
        function stopDraw(e) { e.preventDefault(); isDrawing = false; ctx.closePath(); }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);

        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDraw, {passive: false});

        document.getElementById('btn-clear').addEventListener('click', clearCanvas);

        // 送信ボタン：Canvasの絵を画像データ（文字列）に変換してReplicantに保存
        document.getElementById('btn-submit').addEventListener('click', () => {
            const playerIndex = parseInt(playerSelect.value);
            const imageData = canvas.toDataURL('image/png'); // 画像を文字に変換
            
            const currentState = gameRep.value;
            currentState.answers[playerIndex] = imageData;
            currentState.isOpen[playerIndex] = false; // 送信時は伏せた状態
            gameRep.value = currentState;

            // 送信完了のフィードバック
            const btn = document.getElementById('btn-submit');
            btn.innerText = "✅ 送信完了！";
            btn.style.background = "#4CAF50";
            setTimeout(() => { btn.innerText = "🚀 送信"; btn.style.background = "#e91e63"; }, 2000);
        });
    </script>
</body>
</html>

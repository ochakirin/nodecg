<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 15px; background: #fdfdfd; margin: 0; }
        .control-group { background: #e0f7fa; border: 2px solid #00bcd4; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .title { font-weight: bold; font-size: 16px; color: #00838f; }
        .volume-display { font-size: 18px; font-weight: bold; background: white; padding: 4px 10px; border-radius: 4px; border: 1px solid #b2ebf2; width: 50px; text-align: center; }
        
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00bcd4; }
        .test-btn { background: #009688; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; transition: opacity 0.2s; }
        .test-btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="control-group">
        <div class="header">
            <div class="title">🔔 SE (効果音) 音量</div>
            <div class="volume-display" id="se-vol-disp">50%</div>
        </div>
        <input type="range" id="se-slider" min="0" max="100" value="50">
        <button class="test-btn" id="btn-test-se">🔊 テスト再生 (全員オープン音)</button>
    </div>

    <div class="control-group" style="background: #fff3e0; border-color: #ff9800;">
        <div class="header">
            <div class="title" style="color: #e65100;">🎵 BGM 音量 (※今後の拡張用)</div>
            <div class="volume-display" id="bgm-vol-disp">50%</div>
        </div>
        <input type="range" id="bgm-slider" min="0" max="100" value="50" style="accent-color: #ff9800;">
    </div>

    <script>
        // サウンド設定用の独立したReplicantを作成
        const soundRep = nodecg.Replicant('soundSettings', {
            defaultValue: { seVolume: 0.5, bgmVolume: 0.5 }
        });

        const seSlider = document.getElementById('se-slider');
        const seDisp = document.getElementById('se-vol-disp');
        const bgmSlider = document.getElementById('bgm-slider');
        const bgmDisp = document.getElementById('bgm-vol-disp');

        // スライダーを動かした時にReplicantを更新
        seSlider.addEventListener('input', (e) => {
            const vol = parseInt(e.target.value, 10);
            const state = JSON.parse(JSON.stringify(soundRep.value));
            state.seVolume = vol / 100;
            soundRep.value = state;
        });

        bgmSlider.addEventListener('input', (e) => {
            const vol = parseInt(e.target.value, 10);
            const state = JSON.parse(JSON.stringify(soundRep.value));
            state.bgmVolume = vol / 100;
            soundRep.value = state;
        });

        // テスト再生ボタン
        document.getElementById('btn-test-se').addEventListener('click', () => {
            nodecg.sendMessage('play_open_se');
        });

        // Replicantの変更を監視してUIに反映（他の人が操作した場合もここが動く）
        soundRep.on('change', (newVal) => {
            if (!newVal) return;
            
            const sePercent = Math.round(newVal.seVolume * 100);
            const bgmPercent = Math.round(newVal.bgmVolume * 100);

            // 操作中でない場合のみUIを更新する
            if (document.activeElement !== seSlider) {
                seSlider.value = sePercent;
            }
            seDisp.innerText = sePercent + "%";

            if (document.activeElement !== bgmSlider) {
                bgmSlider.value = bgmPercent;
            }
            bgmDisp.innerText = bgmPercent + "%";
        });
    </script>
</body>
</html>

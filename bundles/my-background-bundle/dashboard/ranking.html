<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 15px; background: #f0f2f5; margin: 0; }
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h3 { margin: 0; font-size: 18px; color: #333; } /* タイトルを少し大きく */
        
        /* 🔴 横幅を少し広く設定 */
        .rank-container { 
            background: white; 
            border-radius: 8px; 
            border: 1px solid #e1e4e8; 
            max-height: 560px; 
            overflow-y: auto; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }
        
        table { width: 100%; border-collapse: collapse; font-size: 15px; } /* 文字を少し大きく */
        th { background: #f6f8fa; color: #24292e; font-weight: bold; padding: 14px; border-bottom: 2px solid #e1e4e8; position: sticky; top: 0; z-index: 10; text-align: center; }
        td { padding: 12px 14px; border-bottom: 1px solid #eaecef; color: #333; text-align: center; }
        .rank-top { font-weight: bold; color: #d32f2f; font-size: 16px; }
        .time-cell { font-family: 'Courier New', Courier, monospace; font-weight: bold; }
        .status-msg { padding: 40px; text-align: center; color: #586069; font-style: italic; }
        .sync-tag { font-size: 11px; color: #fff; background: #ff9800; padding: 3px 8px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-area">
        <h3>🏆 チームランキング</h3>
        <span class="sync-tag">● プレビュー連動・リアルタイム</span>
    </div>

    <div class="rank-container">
        <table id="rank-table">
            <thead>
                <tr>
                    <th>順位</th>
                    <th>チーム</th>
                    <th>現在のラップ位置</th>
                    <th>最新ラップタイム</th>
                </tr>
            </thead>
            <tbody id="rank-tbody"></tbody>
        </table>
        <div id="status" class="status-msg">プレビュー画面からのデータ同期を待機中...</div>
    </div>

    <script>
        // 🔴 プレビュー画面が取得した最新データを常時監視（自身はGoogleへ一切通信しない）
        const sharedCsvRep = nodecg.Replicant('sharedCsvData');

        function parseCSV(text) {
            const rows = [];
            const pattern = /"([^"]*(?:""[^"]*)*)"|([^,]+)|(?<=,|^)(?=,|$)/g;
            text.split(/\r?\n/).forEach(line => {
                if (!line.trim()) return;
                const matches = line.matchAll(pattern);
                const row = Array.from(matches).map(m => (m[1] !== undefined ? m[1].replace(/""/g, '"') : m[2] || '').trim());
                rows.push(row);
            });
            return rows;
        }

        function timeToSeconds(timeStr) {
            if (!timeStr || timeStr.includes('-')) return Infinity; 
            const parts = timeStr.split(':');
            if (parts.length === 3) {
                return (parseInt(parts[0], 10) || 0) * 3600 + (parseInt(parts[1], 10) || 0) * 60 + (parseInt(parts[2], 10) || 0);
            }
            return Infinity;
        }

        // 🔴 データを受信したらソートして描画するメインロジック
        function processAndRender(csvText) {
            if (!csvText) return;
            const rows = parseCSV(csvText);
            if (rows.length === 0) return;

            const rowTitles = rows.map(r => r[0]); 
            const headers = rows[0];
            const teamDataList = [];

            for (let colIdx = 1; colIdx < headers.length; colIdx++) {
                const teamName = headers[colIdx];
                if (!teamName) continue;

                const laps = [];
                const lapIndices = []; 
                for (let rowIdx = 1; rowIdx < rows.length; rowIdx++) {
                    const cell = rows[rowIdx][colIdx];
                    if (cell && cell !== '-' && cell !== '') {
                        laps.push(cell);
                        lapIndices.push(rowIdx);
                    }
                }

                const lapCount = laps.length;
                const currentTitle = lapCount > 0 ? rowTitles[lapIndices[lapIndices.length - 1]] : '未スタート';

                teamDataList.push({
                    name: teamName,
                    lapCount: lapCount,
                    lapTitle: currentTitle,
                    lastTime: lapCount > 0 ? laps[laps.length - 1] : '--:--:--'
                });
            }

            // 正確な秒数ソート
            teamDataList.sort((a, b) => {
                if (b.lapCount !== a.lapCount) return b.lapCount - a.lapCount; 
                if (a.lapCount > 0) {
                    return timeToSeconds(a.lastTime) - timeToSeconds(b.lastTime);
                }
                return 0;
            });

            const tbody = document.getElementById('rank-tbody');
            document.getElementById('status').style.display = 'none';
            tbody.innerHTML = '';

            let currentRank = 1;
            for (let i = 0; i < teamDataList.length; i++) {
                const currentTeam = teamDataList[i];

                if (i > 0) {
                    const prevTeam = teamDataList[i - 1];
                    if (currentTeam.lapCount !== prevTeam.lapCount || (currentTeam.lapCount > 0 && currentTeam.lastTime !== prevTeam.lastTime)) {
                        currentRank = i + 1;
                    }
                }

                const tr = document.createElement('tr');
                const rankClass = currentRank <= 3 ? 'rank-top' : '';

                tr.innerHTML = `
                    <td class="${rankClass}">${currentRank}位</td>
                    <td style="font-weight: bold;">${currentTeam.name}</td>
                    <td><span style="background: #e0f2f1; padding: 4px 12px; border-radius: 4px; font-weight: bold; color: #009688;">${currentTeam.lapTitle}</span></td>
                    <td class="time-cell">${currentTeam.lastTime}</td>
                `;
                tbody.appendChild(tr);
            }
        }

        // 🔴 プレビュー画面がデータを更新した瞬間を100%リアルタイム検知
        sharedCsvRep.on('change', (newVal) => {
            if (newVal) {
                processAndRender(newVal);
            }
        });
    </script>
</body>
</html>

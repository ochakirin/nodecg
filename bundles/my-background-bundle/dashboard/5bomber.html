<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; }
        select, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #ddd; font-size: 15px; }
        .list-container { background: white; border-radius: 8px; padding: 5px; max-height: 400px; overflow-y: auto; border: 1px solid #ddd; }
        .list-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .list-item:hover { background: #fff7f5; }
        .list-item.checked { background: #e8f5e9; } /* チェック済みは色を変える */
        .list-item input { margin-right: 12px; transform: scale(1.4); }
        #reset-btn { background: #e74c3c; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h3>▼ カテゴリ選択（選ぶと即タイトル反映）</h3>
    <select id="category-select"><option>読み込み中...</option></select>

    <h3>▼ 項目リスト（チェックは累積されます）</h3>
    <div class="list-container" id="item-list">カテゴリを選んでください。</div>

    <button id="reset-btn">回答のみ消去（リセット）</button>

    <script>
        // 別々のReplicantで管理
        const activeTitle = nodecg.Replicant('activeTitle', { defaultValue: '' });
        const activeAnswer = nodecg.Replicant('activeAnswer', { defaultValue: '' });
        const checkedItems = nodecg.Replicant('checkedItems', { defaultValue: [] });

        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS0zdAHgQVzMwzQ777JQmPT2U6ytGF6zT_lTQL_adj5c6pDGbdAM0pF05o1f8QCOAPRGdFNKpyS-n3I/pub?output=csv';
        let sheetData = {};

        // スプレッドシート読み込み
        async function init() {
            const res = await fetch(SHEET_URL + '&t=' + Date.now());
            const text = await res.text();
            const rows = text.split('\n').map(row => row.split(',').map(c => c.trim().replace(/^"|"$/g, '')));
            const titles = rows[0];
            titles.forEach((t, i) => { if(t) sheetData[t] = rows.slice(1).map(r => r[i]).filter(c => c); });

            const select = document.getElementById('category-select');
            select.innerHTML = '<option value="">選択してください</option>';
            Object.keys(sheetData).forEach(t => {
                const opt = document.createElement('option');
                opt.value = t; opt.innerText = t;
                select.appendChild(opt);
            });
        }

        // プルダウン選択時：タイトルだけを更新
        document.getElementById('category-select').addEventListener('change', (e) => {
            const title = e.target.value;
            activeTitle.value = title; // 即座にReplicantへ
            renderList(title);
        });

        function renderList(title) {
            const container = document.getElementById('item-list');
            container.innerHTML = '';
            if (!sheetData[title]) return;

            sheetData[title].forEach(item => {
                const label = document.createElement('label');
                label.className = 'list-item';
                const isChecked = checkedItems.value.includes(item);
                if(isChecked) label.classList.add('checked');

                label.innerHTML = `<input type="checkbox" ${isChecked ? 'checked' : ''}> <span>${item}</span>`;
                
                label.querySelector('input').addEventListener('change', (e) => {
                    if (e.target.checked) {
                        // チェックを入れた時：回答を更新（音が出る）
                        activeAnswer.value = item;
                        if (!checkedItems.value.includes(item)) {
                            checkedItems.value.push(item);
                        }
                        label.classList.add('checked');
                    } else {
                        // チェックを外した時：リストから除外するだけ（回答は消さない）
                        checkedItems.value = checkedItems.value.filter(i => i !== item);
                        label.classList.remove('checked');
                    }
                });
                container.appendChild(label);
            });
        }

        // リセットボタン：回答（文字）とチェック状態のみ消す
        document.getElementById('reset-btn').addEventListener('click', () => {
            activeAnswer.value = '';
            checkedItems.value = [];
            renderList(document.getElementById('category-select').value);
        });

        init();
    </script>
</body>
</html>

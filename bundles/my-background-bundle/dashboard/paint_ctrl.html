<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; padding: 12px; background: #f0f2f5; margin: 0; }
        .panel-title { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 12px; border-bottom: 2px solid #e91e63; padding-bottom: 6px; }
        
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .control-box { background: white; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .box-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; color: white; background: #9e9e9e; }
        .status-badge.submitted { background: #e91e63; }
        
        /* 🔴 リアルタイムプレビュー枠の高さを拡大 (120px -> 180px) */
        .live-preview { width: 100%; height: 180px; background: #fdfdfd; border: 2px dashed #ccc; border-radius: 4px; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        .live-preview img { width: 100%; height: 100%; object-fit: contain; }
        .live-text { position: absolute; font-size: 11px; color: #aaa; }
        
        .name-input { width: 100%; padding: 6px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-bottom: 8px; }
        
        .action-btns { display: flex; gap: 5px; }
        button { flex: 1; padding: 6px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; color: white; font-size: 12px; }
        .btn-copy { background: #009688; }
        .btn-jump { background: #795548; }
        
        .master-btns { display: flex; gap: 10px; margin-top: 15px; }
        .master-btns button { flex: 1; padding: 14px; font-size: 14px; }
        .btn-reset { background: #607d8b; }
    </style>
</head>
<body>

    <div class="panel-title">🎨 お絵かきペイント進行管理（4枠）</div>
    
    <div class="grid-container" id="player-controls"></div>

    <div class="master-btns">
        <button class="btn-reset" id="btn-reset">🔄 全データリセット</button>
    </div>

    <script>
        // ※ 常に配信画面に絵がダダ漏れになる仕様にしたため、MCの「オープン」ボタンは役割がなくなったので削除しました。
        const gameRep = nodecg.Replicant('paintState', {
            defaultValue: { answers: ['', '', '', ''], isOpen: [false, false, false, false], names: ['', '', '', ''], live: ['', '', '', ''] }
        });

        const container = document.getElementById('player-controls');

        for (let i = 0; i < 4; i++) {
            const box = document.createElement('div');
            box.className = 'control-box';
            box.innerHTML = `
                <div class="box-header">
                    <strong>枠 ${i + 1}</strong>
                    <span class="status-badge" id="badge-${i}">未提出</span>
                </div>
                <div class="live-preview">
                    <span class="live-text" id="live-text-${i}">リアルタイム描画なし</span>
                    <img id="live-img-${i}" src="" style="display:none;">
                </div>
                <input type="text" class="name-input" id="name-input-${i}" placeholder="名前を入力">
                <div class="action-btns">
                    <button class="btn-copy" id="copy-btn-${i}">🔗 コピー</button>
                    <button class="btn-jump" id="jump-btn-${i}">🚀 開く</button>
                </div>
            `;
            container.appendChild(box);

            document.getElementById(`name-input-${i}`).addEventListener('input', (e) => {
                const state = JSON.parse(JSON.stringify(gameRep.value));
                if (!state.names) state.names = ['', '', '', ''];
                state.names[i] = e.target.value;
                gameRep.value = state;
            });

            const getPanelUrl = () => {
                return `${window.location.origin}/bundles/my-background-bundle/dashboard/paint_pad.html?player=${i}&standalone=true`;
            };

            document.getElementById(`copy-btn-${i}`).addEventListener('click', () => {
                navigator.clipboard.writeText(getPanelUrl()).then(() => alert(`枠${i+1}のURLをコピーしました`));
            });

            document.getElementById(`jump-btn-${i}`).addEventListener('click', () => window.open(getPanelUrl(), '_blank'));
        }

        gameRep.on('change', (newVal) => {
            if (!newVal) return;
            for (let i = 0; i < 4; i++) {
                const badge = document.getElementById(`badge-${i}`);
                const nameInput = document.getElementById(`name-input-${i}`);
                const liveImg = document.getElementById(`live-img-${i}`);
                const liveText = document.getElementById(`live-text-${i}`);
                
                if (newVal.live && newVal.live[i] && newVal.live[i] !== '') {
                    liveImg.src = newVal.live[i];
                    liveImg.style.display = 'block';
                    liveText.style.display = 'none';
                } else {
                    liveImg.style.display = 'none';
                    liveText.style.display = 'block';
                }

                if (newVal.answers && newVal.answers[i] !== '') {
                    badge.innerText = "提出完了！";
                    badge.classList.add('submitted');
                } else {
                    badge.innerText = "描画中...";
                    badge.classList.remove('submitted');
                }

                if (newVal.names && document.activeElement !== nameInput) {
                    nameInput.value = newVal.names[i] || '';
                }
            }
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            if (confirm("全員のペイントデータ（名前含む）を完全に消去します。よろしいですか？")) {
                gameRep.value = { answers: ['', '', '', ''], isOpen: [false, false, false, false], names: ['', '', '', ''], live: ['', '', '', ''] };
            }
        });
    </script>
</body>
</html>

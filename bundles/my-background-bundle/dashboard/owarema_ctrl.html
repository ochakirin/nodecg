<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #eceff1; color: #333; }
        .container { display: flex; gap: 20px; width: 100%; }
        .team-col { flex: 1; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .team-A { border-top: 5px solid #d32f2f; }
        .team-B { border-top: 5px solid #1976d2; }
        
        h3 { margin-top: 0; text-align: center; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .form-group input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        
        /* 得点エリアのスタイル */
        .score-area { display: flex; align-items: center; justify-content: center; gap: 10px; background: #f5f5f5; padding: 10px; border-radius: 6px; margin-bottom: 20px; }
        .score-area input[type="number"] { width: 80px; font-size: 24px; font-weight: bold; text-align: center; padding: 5px; border: 2px solid #ccc; border-radius: 4px; }
        .score-btn { font-size: 16px; padding: 5px 10px; cursor: pointer; border: none; border-radius: 4px; background: #e0e0e0; font-weight: bold; }
        .score-btn:hover { background: #bdbdbd; }

        .bulk-actions { display: flex; gap: 10px; margin-bottom: 20px; }
        .bulk-actions button { flex: 1; padding: 10px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; color: white; }
        .btn-open { background: #4caf50; }
        .btn-red { background: #e91e63; }
        .btn-reset { background: #607d8b; }
        
        .player-row { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #eee; }
        .player-name { font-weight: bold; width: 80px; font-size: 14px; }
        .url-btn { padding: 4px 8px; font-size: 12px; background: #2196f3; color: white; border: none; border-radius: 3px; cursor: pointer; }
        .url-btn.jump { background: #ff9800; }
    </style>
</head>
<body>

<div class="container">
    <!-- 🟥 チームA カラム -->
    <div class="team-col team-A">
        <h3 id="name-display-0">チームA</h3>
        <div class="form-group">
            <label>チーム名</label>
            <input type="text" id="team-name-0" onchange="updateTeamData(0, 'name', this.value)">
        </div>
        <div class="form-group">
            <label>お題</label>
            <input type="text" id="team-theme-0" onchange="updateTeamData(0, 'theme', this.value)">
        </div>
        
        <!-- 🔴 得点入力エリア -->
        <div class="score-area">
            <button class="score-btn" onclick="addScore(0, -10)">-10</button>
            <input type="number" id="team-score-0" value="0" onchange="updateTeamData(0, 'score', this.value)">
            <button class="score-btn" onclick="addScore(0, 10)">+10</button>
        </div>

        <div class="bulk-actions">
            <button class="btn-open" onclick="bulkAction(0, 'open')">一斉オープン</button>
            <button class="btn-red" onclick="bulkAction(0, 'red')">赤背景にする</button>
            <button class="btn-reset" onclick="bulkAction(0, 'reset')">回答リセット</button>
        </div>
        <div id="players-0"></div>
    </div>

    <!-- 🟦 チームB カラム -->
    <div class="team-col team-B">
        <h3 id="name-display-1">チームB</h3>
        <div class="form-group">
            <label>チーム名</label>
            <input type="text" id="team-name-1" onchange="updateTeamData(1, 'name', this.value)">
        </div>
        <div class="form-group">
            <label>お題</label>
            <input type="text" id="team-theme-1" onchange="updateTeamData(1, 'theme', this.value)">
        </div>
        
        <!-- 🔴 得点入力エリア -->
        <div class="score-area">
            <button class="score-btn" onclick="addScore(1, -10)">-10</button>
            <input type="number" id="team-score-1" value="0" onchange="updateTeamData(1, 'score', this.value)">
            <button class="score-btn" onclick="addScore(1, 10)">+10</button>
        </div>

        <div class="bulk-actions">
            <button class="btn-open" onclick="bulkAction(1, 'open')">一斉オープン</button>
            <button class="btn-red" onclick="bulkAction(1, 'red')">赤背景にする</button>
            <button class="btn-reset" onclick="bulkAction(1, 'reset')">回答リセット</button>
        </div>
        <div id="players-1"></div>
    </div>
</div>

<script>
    const defaultState = {
        teamNames: ["チームA", "チームB"],
        teamThemes: ["", ""],
        teamScores: [0, 0], // 得点データを追加
        answers: Array(14).fill(''),
        isOpen: Array(14).fill(false),
        isRed: Array(14).fill(false)
    };

    const gameRep = nodecg.Replicant('owarematenState', { defaultValue: defaultState });
    const baseUrl = window.location.origin + "/bundles/my-background-bundle/graphics/owarema_pad.html";

    function renderPlayers() {
        for (let team = 0; team <= 1; team++) {
            const container = document.getElementById(`players-${team}`);
            container.innerHTML = '';
            const offset = team * 7;
            for (let i = 0; i < 7; i++) {
                const globalIdx = offset + i;
                const role = i === 0 ? "👑" : `P${i}`;
                container.innerHTML += `
                    <div class="player-row">
                        <span class="player-name">${role}</span>
                        <button class="url-btn" onclick="copyUrl(${globalIdx})">URLコピー</button>
                        <button class="url-btn jump" onclick="window.open('${baseUrl}?p=${globalIdx}', '_blank')">開く</button>
                        <span id="status-${globalIdx}" style="font-size:12px; color:#888; margin-left:auto;">未提出</span>
                    </div>
                `;
            }
        }
    }

    gameRep.on('change', (newVal) => {
        if (!newVal) return;
        
        // チーム情報と得点の反映
        for (let i = 0; i <= 1; i++) {
            document.getElementById(`name-display-${i}`).innerText = newVal.teamNames[i] || `チーム${i==0?'A':'B'}`;
            document.getElementById(`team-name-${i}`).value = newVal.teamNames[i] || '';
            document.getElementById(`team-theme-${i}`).value = newVal.teamThemes[i] || '';
            
            // 得点が未定義の場合は0をセット
            if (!newVal.teamScores) newVal.teamScores = [0, 0];
            document.getElementById(`team-score-${i}`).value = newVal.teamScores[i];
        }

        // 回答状況の反映
        newVal.answers.forEach((ans, idx) => {
            const statusEl = document.getElementById(`status-${idx}`);
            if (statusEl) {
                statusEl.innerText = ans ? "✅ 提出済" : "未提出";
                statusEl.style.color = ans ? "#4caf50" : "#888";
            }
        });
    });

    window.updateTeamData = function(teamIdx, type, value) {
        const state = JSON.parse(JSON.stringify(gameRep.value));
        if (type === 'name') state.teamNames[teamIdx] = value;
        if (type === 'theme') state.teamThemes[teamIdx] = value;
        if (type === 'score') {
            if (!state.teamScores) state.teamScores = [0, 0];
            state.teamScores[teamIdx] = parseInt(value, 10) || 0;
        }
        gameRep.value = state;
    };

    window.addScore = function(teamIdx, amount) {
        const state = JSON.parse(JSON.stringify(gameRep.value));
        if (!state.teamScores) state.teamScores = [0, 0];
        state.teamScores[teamIdx] += amount;
        gameRep.value = state;
    };

    window.bulkAction = function(teamIdx, action) {
        const state = JSON.parse(JSON.stringify(gameRep.value));
        const offset = teamIdx * 7;
        for (let i = 0; i < 7; i++) {
            const idx = offset + i;
            if (action === 'open') state.isOpen[idx] = true;
            if (action === 'red') state.isRed[idx] = true;
            if (action === 'reset') {
                state.answers[idx] = '';
                state.isOpen[idx] = false;
                state.isRed[idx] = false;
            }
        }
        gameRep.value = state;
    };

    window.copyUrl = function(idx) {
        const url = `${baseUrl}?p=${idx}`;
        navigator.clipboard.writeText(url).then(() => alert(`プレイヤー${idx}のURLをコピーしました！`));
    };

    renderPlayers();
</script>
</body>
</html>

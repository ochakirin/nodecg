<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f0f2f5; margin: 0; }
        .control-row { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #ddd; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; color: white; background: #9e9e9e; }
        .status-badge.submitted { background: #e91e63; }
        button { padding: 8px 16px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; background: #2196f3; }
        button.is-open { background: #4caf50; }
        .master-btns { display: flex; gap: 10px; margin-top: 20px; }
        .master-btns button { flex: 1; padding: 15px; font-size: 16px; }
        .btn-all-open { background: #ff9800; }
        .btn-reset { background: #607d8b; }
    </style>
</head>
<body>

    <div id="player-controls">
        </div>

    <div class="master-btns">
        <button class="btn-all-open" id="btn-all-open">🎉 全員一斉オープン</button>
        <button class="btn-reset" id="btn-reset">🔄 全データリセット</button>
    </div>

    <script>
        const gameRep = nodecg.Replicant('owarematenState', {
            defaultValue: { answers: ['', '', '', '', '', '', ''], isOpen: [false, false, false, false, false, false, false] }
        });

        const container = document.getElementById('player-controls');

        // 7人分のコントロールUIを生成
        for (let i = 0; i < 7; i++) {
            const row = document.createElement('div');
            row.className = 'control-row';
            row.innerHTML = `
                <div><strong>${i + 1}人目</strong> <span class="status-badge" id="badge-${i}">未提出</span></div>
                <button id="toggle-btn-${i}">👁️ オープン</button>
            `;
            container.appendChild(row);

            // 個別オープンボタンの処理
            document.getElementById(`toggle-btn-${i}`).addEventListener('click', () => {
                const state = gameRep.value;
                state.isOpen[i] = !state.isOpen[i];
                gameRep.value = state;
            });
        }

        // Replicantの変更をUIに反映
        gameRep.on('change', (newVal) => {
            if (!newVal) return;
            for (let i = 0; i < 7; i++) {
                const badge = document.getElementById(`badge-${i}`);
                const btn = document.getElementById(`toggle-btn-${i}`);
                
                // 提出状況
                if (newVal.answers[i] !== '') {
                    badge.innerText = "提出済！";
                    badge.classList.add('submitted');
                } else {
                    badge.innerText = "未提出";
                    badge.classList.remove('submitted');
                }

                // オープン状況
                if (newVal.isOpen[i]) {
                    btn.innerText = "閉じている";
                    btn.classList.add('is-open');
                } else {
                    btn.innerText = "👁️ オープン";
                    btn.classList.remove('is-open');
                }
            }
        });

        // 一斉オープン
        document.getElementById('btn-all-open').addEventListener('click', () => {
            const state = gameRep.value;
            for (let i = 0; i < 7; i++) { if (state.answers[i] !== '') state.isOpen[i] = true; }
            gameRep.value = state;
        });

        // 全リセット
        document.getElementById('btn-reset').addEventListener('click', () => {
            if (confirm("全員の回答を消去します。よろしいですか？")) {
                gameRep.value = { answers: ['', '', '', '', '', '', ''], isOpen: [false, false, false, false, false, false, false] };
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Paint Overlay</title>
    <style>
        body { margin: 0; padding: 0; width: 1920px; height: 1080px; background: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; position: relative; }
        
        .stage-container { position: absolute; top: 80px; left: 80px; right: 80px; bottom: 80px; display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); gap: 40px; }

        .answer-slot { background: #ffffff; border: 8px solid #607d8b; border-radius: 16px; display: flex; flex-direction: column; align-items: center; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.4); overflow: hidden; transition: all 0.3s ease; }
        .player-name { background: #607d8b; color: white; width: 100%; text-align: center; font-weight: bold; font-size: 36px; padding: 15px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; z-index: 20; }
        
        .board-area { flex: 1; width: 100%; display: flex; justify-content: center; align-items: center; background: #fff; position: relative; padding: 20px; box-sizing: border-box; min-height: 0; overflow: hidden; }
        .answer-img { width: 100%; height: 100%; object-fit: contain; display: none; } 

        .cover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #eceff1; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #90a4ae; font-size: 40px; transition: all 0.3s ease; z-index: 10; }
        .cover.submitted { background: #e91e63; color: white; }
        
        .is-open .cover { opacity: 0; pointer-events: none; }
        .is-open .answer-img { display: block; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.2); }

        @keyframes popIn {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="stage-container" id="stage-container"></div>

    <script>
        const gameRep = nodecg.Replicant('paintState', {
            defaultValue: { answers: ['', '', '', ''], isOpen: [false, false, false, false], names: ['', '', '', ''], live: ['', '', '', ''] }
        });
        
        const container = document.getElementById('stage-container');

        for (let i = 0; i < 4; i++) {
            const slot = document.createElement('div');
            slot.className = 'answer-slot';
            slot.id = `slot-${i}`;
            slot.innerHTML = `
                <div class="player-name" id="name-tag-${i}">${i + 1}人目</div>
                <div class="board-area">
                    <img class="answer-img" id="img-${i}" src="" alt="">
                    <div class="cover" id="cover-${i}">お絵かき中...</div>
                </div>
            `;
            container.appendChild(slot);
        }

        gameRep.on('change', (newVal) => {
            if (!newVal) return;
            for (let i = 0; i < 4; i++) {
                const slot = document.getElementById(`slot-${i}`);
                const cover = document.getElementById(`cover-${i}`);
                const img = document.getElementById(`img-${i}`);
                const nameTag = document.getElementById(`name-tag-${i}`);

                if (newVal.names && newVal.names[i] && newVal.names[i].trim() !== '') {
                    nameTag.innerText = newVal.names[i].trim();
                } else {
                    nameTag.innerText = `${i + 1}人目`;
                }

                if (newVal.answers && newVal.answers[i] !== '') {
                    img.src = newVal.answers[i];
                    cover.innerText = "完成！";
                    cover.classList.add('submitted');
                } else {
                    img.src = "";
                    cover.innerText = "お絵かき中...";
                    cover.classList.remove('submitted');
                }

                if (newVal.isOpen && newVal.isOpen[i] && newVal.answers && newVal.answers[i] !== '') {
                    slot.classList.add('is-open');
                } else {
                    slot.classList.remove('is-open');
                }
            }
        });
    </script>
</body>
</html>

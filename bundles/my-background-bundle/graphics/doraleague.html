<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>DoraLeague - 5 Bomber Perfect Sync</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 画面を均等に5分割するレーンシステム */
        .bomber-stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            display: flex;
            z-index: 5;
            pointer-events: none;
        }

        .bomber-lane {
            flex: 1;
            height: 100%;
            border-right: 4px dashed rgba(255, 255, 255, 0.15);
            box-sizing: border-box;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center;
            padding-bottom: 120px; 
        }
        .bomber-lane:last-child { border-right: none; }

        /* 🔴 表示は「1人目〜5人目」。初期は灰色、正解数に応じて緑色に変化 */
        .lane-status-text {
            font-size: 38px;
            font-weight: 900;
            color: #757575; /* 初期：灰色 */
            background: rgba(30, 30, 30, 0.75);
            padding: 12px 40px;
            border-radius: 6px;
            border: 3px solid #616161;
            text-shadow: 0 4px 6px rgba(0,0,0,0.6);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 6;
        }

        /* 🔴 累計正解数に到達したレーンは鮮やかな緑色に発光 */
        .bomber-lane.is-active .lane-status-text {
            color: #00ff66; 
            background: rgba(0, 60, 20, 0.85);
            border-color: #00ff66;
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.6);
            transform: scale(1.05);
        }

        /* レーン最下部のゴール境界線 */
        .lane-goal {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20px;
            background: rgba(255, 23, 72, 0.2);
        }

        /* 💣 ロックボムの制御コンテナ */
        .bomb-container {
            position: absolute;
            top: -150px; 
            left: 0px; 
            width: 384px; 
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 15;
            pointer-events: none;
            transition: left 0.5s cubic-bezier(0.25, 1, 0.5, 1), top 0.1s linear;
        }

        .bomb-img {
            width: 160px;
            height: 160px;
            object-fit: contain;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.6));
        }

        /* =================================================================
           テロップ表示エリア（画面中央の上・下）
           ================================================================= */
        /* 🔴 画面中央の上：直近でチェックを入れた内容 */
        .info-top-container {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 35, 126, 0.92); /* 高級感のあるネイビーブルー */
            border: 3px solid #2979ff;
            padding: 10px 45px;
            border-radius: 8px;
            color: #ffffff;
            font-size: 38px;
            font-weight: bold;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 20;
            min-width: 450px;
            text-align: center;
            display: none; 
        }

        /* 🔴 画面中央の下：選択されたカテゴリ名 */
        .info-bottom-container {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(211, 47, 47, 0.95); /* 力強い赤オレンジ */
            border: 3px solid #ff1744;
            padding: 14px 60px;
            border-radius: 50px; 
            color: #ffffff;
            font-size: 46px;
            font-weight: 900;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 20;
            min-width: 500px;
            text-align: center;
            letter-spacing: 2px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="bomber-stage">
        <div class="bomber-lane" id="lane-0"><div class="lane-status-text">1人目</div><div class="lane-goal"></div></div>
        <div class="bomber-lane" id="lane-1"><div class="lane-status-text">2人目</div><div class="lane-goal"></div></div>
        <div class="bomber-lane" id="lane-2"><div class="lane-status-text">3人目</div><div class="lane-goal"></div></div>
        <div class="bomber-lane" id="lane-3"><div class="lane-status-text">4人目</div><div class="lane-goal"></div></div>
        <div class="bomber-lane" id="lane-4"><div class="lane-status-text">5人目</div><div class="lane-goal"></div></div>
    </div>

    <div class="bomb-container" id="bomb-actor">
        <img src="rockbomb.webp" class="bomb-img" alt="bomb">
    </div>

    <div class="info-top-container" id="text-top-item">---</div>
    <div class="info-bottom-container" id="text-bottom-category">---</div>

    <script>
        // 5ボンバーシステム連携用のReplicant群
        const bomberRep = nodecg.Replicant('fiveBomberState', { defaultValue: { status: 'idle', count: 0 } });
        
        // 🔴 5bomber.htmlが使っている実物のメモリをダイレクト監視
        const activeTitle = nodecg.Replicant('activeTitle', { defaultValue: '' });
        const activeAnswer = nodecg.Replicant('activeAnswer', { defaultValue: '' });
        const checkedItems = nodecg.Replicant('checkedItems', { defaultValue: [] });
        
        const bombActor = document.getElementById('bomb-actor');
        const textTopItem = document.getElementById('text-top-item');
        const textBottomCategory = document.getElementById('text-bottom-category');
        
        // 音声アセット定義
        const soundBgm = new Audio('sounds/bgm.mp3');
        const soundClear = new Audio('sounds/clear.mp3');
        const soundCorrect = new Audio('sounds/correct.mp3'); // 🔴 追加：単発の正解音
        soundBgm.loop = true;

        const LANE_WIDTH = 384;       
        const START_TOP = -150;       
        const GOAL_TOP = 930;         
        const TOTAL_DURATION = 30000;  

        let bomberAnimationFrameToken = null;
        let bomberStartTime = null;
        let bomberCurrentStatus = 'idle';
        let previousTotalCount = 0; // 正解音用の前回復習カウンター

        // 30秒の滑らかな落下制御を行うループ
        function tickBomberDrop(timestamp) {
            if (bomberCurrentStatus !== 'playing') return;

            if (!bomberStartTime) bomberStartTime = timestamp;
            const elapsed = timestamp - bomberStartTime;
            const progress = Math.min(elapsed / TOTAL_DURATION, 1);
            
            const currentTop = START_TOP + (GOAL_TOP - START_TOP) * progress;
            bombActor.style.top = `${currentTop}px`;

            if (progress < 1) {
                bomberAnimationFrameToken = requestAnimationFrame(tickBomberDrop);
            } else {
                bomberCurrentStatus = 'timeup';
                soundBgm.pause();
            }
        }

        // 🔴 1. カテゴリ選択（activeTitle）を監視して画面下に常時表示
        activeTitle.on('change', (newVal) => {
            if (newVal && newVal.trim() !== '') {
                textBottomCategory.innerText = newVal;
                textBottomCategory.style.display = 'block';
            } else {
                textBottomCategory.style.display = 'none';
            }
        });

        // 🔴 2. 直近の正解（activeAnswer）を監視して画面上に常時表示＆正解音トリガー
        activeAnswer.on('change', (newVal) => {
            if (newVal && newVal.trim() !== '') {
                textTopItem.innerText = `🟢 正解: ${newVal}`;
                textTopItem.style.display = 'block';

                // BGMが流れている（タイマー進行中）のときだけ、チェック時に「correct.mp3」を鳴らす
                if (bomberCurrentStatus === 'playing') {
                    soundCorrect.currentTime = 0;
                    soundCorrect.play().catch(e => console.log("Audio block:", e));
                }
            } else {
                textTopItem.style.display = 'none';
            }
        });

        // 3. 運行管理パネルからのゲームステータス同期
        bomberRep.on('change', (newVal) => {
            if (!newVal) return;

            // 🔴 累計正解数(0〜5)を基に、左から順にレーンを「灰色 ➔ 緑色」にアクティブ化
            for (let i = 0; i < 5; i++) {
                const laneEl = document.getElementById(`lane-${i}`);
                if (i < newVal.count) {
                    laneEl.classList.add('is-active');
                } else {
                    laneEl.classList.remove('is-active');
                }
            }

            // 爆弾の横スライド位置の決定（最大5番目のレーン）
            const targetLaneIdx = Math.min(newVal.count, 4);
            bombActor.style.left = `${targetLaneIdx * LANE_WIDTH}px`;

            // 【スタート】
            if (newVal.status === 'playing' && bomberCurrentStatus !== 'playing') {
                bomberCurrentStatus = 'playing';
                bomberStartTime = null; 
                
                soundClear.pause();
                soundClear.currentTime = 0;
                soundBgm.currentTime = 0;
                soundBgm.play().catch(e => console.log("BGM Blocked:", e));

                bomberAnimationFrameToken = requestAnimationFrame(tickBomberDrop);
            }

            // 【5問クリア】
            if (newVal.status === 'cleared' && bomberCurrentStatus === 'playing') {
                bomberCurrentStatus = 'cleared';
                cancelAnimationFrame(bomberAnimationFrameToken); 

                soundBgm.pause();
                soundClear.currentTime = 0;
                soundClear.play().catch(e => console.log("Clear Sound Blocked:", e));
            }

            // 【リセット】
            if (newVal.status === 'idle') {
                bomberCurrentStatus = 'idle';
                cancelAnimationFrame(bomberAnimationFrameToken);
                bomberStartTime = null;

                soundBgm.pause();
                soundBgm.currentTime = 0;
                soundClear.pause();
                soundClear.currentTime = 0;

                bombActor.style.top = `${START_TOP}px`;
                bombActor.style.left = `0px`;
            }
        });
    </script>
</body>
</html>

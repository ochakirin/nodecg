<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ドラリーグ</title>
    <style>
        body { margin: 0; padding: 0; width: 1920px; height: 1080px; overflow: hidden; font-family: "Meiryo", sans-serif; color: white; position: relative; }
        #header-title { position: absolute; top: 50px; width: 100%; text-align: center; font-size: 60px; font-weight: bold; text-shadow: 4px 4px 8px rgba(0,0,0,0.8); }
        #answer-display { position: absolute; bottom: 100px; width: 100%; text-align: center; font-size: 140px; font-weight: bold; color: #FFEB3B; text-shadow: 6px 6px 12px rgba(0,0,0,1); transition: transform 0.1s ease-out; }
        .pop { transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="header-title"></div>
    <div id="answer-display"></div>

    <script>
        const activeData = nodecg.Replicant('activeData');
        
        // 🔴 GitHubに上げた音声ファイルを直接読み込み
        const correctSound = new Audio('../sounds/正解.mp3');

        activeData.on('change', (newVal) => {
            if (!newVal || !newVal.text) {
                document.getElementById('header-title').innerText = '';
                document.getElementById('answer-display').innerText = '';
                return;
            }

            // 表示の更新
            document.getElementById('header-title').innerText = `【 ${newVal.title} 】`;
            document.getElementById('answer-display').innerText = newVal.text;

            // 🔴 音声を再生
            correctSound.currentTime = 0; // 連続で押しても最初から流れるように
            correctSound.play().catch(e => console.error("音声再生エラー:", e));

            // アニメーション
            const ans = document.getElementById('answer-display');
            ans.classList.add('pop');
            setTimeout(() => ans.classList.remove('pop'), 150);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>DoraLeague - 5 Bomber Auto-Resize Edition</title>
    <style>
        /* 🔴 画面全体のベース：スクロールバーを完全に消去 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
        }

        /* 🔴 【新設】1920x1080の仮想ステージ：この枠の中身が丸ごとリサイズされます */
        #main-stage {
            width: 1920px;
            height: 1080px;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top left; /* 左上を起点にしてきれいに拡大縮小する */
            overflow: hidden;
        }

        /* 背景画像レイヤー */
        .background-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            background-image: url('bg2.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: 1; 
            opacity: 0.6;
            filter: saturate(0.6) brightness(0.8); 
        }

        /* 画面を均等に5分割するレーンシステム */
        .bomber-stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            display: flex;
            z-index: 5;
            pointer-events: none;
        }

        .bomber-lane {
            flex: 1;
            height: 100%;
            border-right: 4px dashed rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            padding-bottom: 240px; 
            transition: all 0.3s ease;
        }
        .bomber-lane:last-child { border-right: none; }

        /* 1人目〜5人目のステータス表示枠 */
        .lane-status-text {
            font-size: 38px;
            font-weight: 900;
            color: #757575; 
            background: rgba(20, 20, 20, 0.9); 
            padding: 12px 40px;
            border-radius: 6px;
            border: 3px solid #616161;
            text-shadow: 0 4px 6px rgba(0,0,0,0.8);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 6;
        }

        /* 累計正解数に到達したレーンの発光スタイル */
        .bomber-lane.is-active .lane-status-text {
            color: #00ff66; 
            background: rgba(0, 50, 15, 0.95);
            border-color: #00ff66;
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.6);
            transform: scale(1.05);
        }

        /* レーン最下部のゴール境界線 */
        .lane-goal {
            position: absolute;
            bottom: 140px; 
            left: 0;
            width: 100%;
            height: 8px;
            background: rgba(255, 23, 72, 0.4);
            box-shadow: 0 0 10px rgba(255, 23, 72, 0.5);
        }

        /* 💣 ロックボムの制御コンテナ */
        .bomb-container {
            position: absolute;
            top: -160px; 
            left: 0px; 
            width: 384px; 
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 15;
            pointer-events: none;
            transition: left 0.5s cubic-bezier(0.25, 1, 0.5, 1), top 0.1s linear;
        }

        .bomb-img {
            width: 160px;
            height: 160px;
            object-fit: contain;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.6));
        }

        /* 直近の正解キーワード */
        .info-top-container {
            position: absolute;
            bottom: 20px; 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(13, 23, 85, 0.96); 
            border: 3px solid #2979ff;
            padding: 14px 40px;
            border-radius: 8px;
            color: #ffffff;
            font-size: 40px; 
            font-weight: bold;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            z-index: 20;
            width: 1200px; 
            max-width: 90vw;
            box-sizing: border-box;
            display: none; 
            justify-content: center;
            align-items: center;
        }

        .info-top-text {
            white-space: nowrap;  
            overflow: hidden;     
            text-overflow: ellipsis; 
            width: 100%;
            text-align: center;
            display: inline-block;
        }

        /* カテゴリ選択 */
        .info-bottom-container {
            position: absolute;
            bottom: 140px; 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(166, 25, 25, 0.96); 
            border: 3px solid #ff1744;
            padding: 12px 60px;
            border-radius: 50px; 
            color: #ffffff;
            font-size: 44px;
            font-weight: 900;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 20;
            min-width: 550px;
            text-align: center;
            letter-spacing: 2px;
            display: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="main-stage">
        <div class="background-layer"></div>

        <div class="bomber-stage">
            <div class="bomber-lane" id="lane-0"><div class="lane-status-text">1人目</div><div class="lane-goal"></div></div>
            <div class="bomber-lane" id="lane-1"><div class="lane-status-text">2人目</div><div class="lane-goal"></div></div>
            <div class="bomber-lane" id="lane-2"><div class="lane-status-text">3人目</div><div class="lane-goal"></div></div>
            <div class="bomber-lane" id="lane-3"><div class="lane-status-text">4人目</div><div class="lane-goal"></div></div>
            <div class="bomber-lane" id="lane-4"><div class="lane-status-text">5人目</div><div class="lane-goal"></div></div>
        </div>

        <div class="bomb-container" id="bomb-actor">
            <img src="rockbomb.webp" class="bomb-img" alt="bomb">
        </div>

        <div class="info-top-container" id="text-top-container">
            <span class="info-top-text" id="text-top-item">---</span>
        </div>
        <div class="info-bottom-container" id="text-bottom-category">---</div>
    </div>

    <script>
        /* =================================================================
           🔴 【新機能】オートリサイズ（ウィンドウサイズ追従）システム
           ================================================================= */
        const mainStage = document.getElementById('main-stage');

        function resizeWindow() {
            const baseWidth = 1920;
            const baseHeight = 1080;
            
            // 現在開いているブラウザウィンドウのリアルタイムの幅と高さ
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            // 縦横どちらに合わせるべきか、縮小・拡大の比率を計算
            const scaleX = windowWidth / baseWidth;
            const scaleY = windowHeight / baseHeight;
            const scale = Math.min(scaleX, scaleY); // 画面からはみ出さない比率を選択

            // ステージ全体をそのままの比率で綺麗に変形させ、画面の真ん中に寄せる
            mainStage.style.transform = `scale(${scale})`;
            mainStage.style.left = `${(windowWidth - baseWidth * scale) / 2}px`;
            mainStage.style.top = `${(windowHeight - baseHeight * scale) / 2}px`;
        }

        // 画面が開いた瞬間、およびウィンドウサイズがグニグニ変更された時に即追従
        window.addEventListener('resize', resizeWindow);
        window.addEventListener('DOMContentLoaded', resizeWindow);

        /* =================================================================
           NodeCG 5ボンバーコアシステム
           ================================================================= */
        const bomberRep = nodecg.Replicant('fiveBomberState', { defaultValue: { status: 'idle', count: 0, buzzerTrigger: 0 } });
        
        const activeTitle = nodecg.Replicant('activeTitle', { defaultValue: '' });
        const activeAnswer = nodecg.Replicant('activeAnswer', { defaultValue: '' });
        const checkedItems = nodecg.Replicant('checkedItems', { defaultValue: [] });
        
        const bombActor = document.getElementById('bomb-actor');
        const textTopContainer = document.getElementById('text-top-container');
        const textTopItem = document.getElementById('text-top-item');
        const textBottomCategory = document.getElementById('text-bottom-category');
        
        let soundBgm, soundClear, soundCorrect, soundBuzzer;
        try {
            soundBgm = new Audio('sounds/bgm.mp3');
            soundClear = new Audio('sounds/clear.mp3');
            soundCorrect = new Audio('sounds/correct.mp3'); 
            soundBuzzer = new Audio('sounds/buzzer.mp3');
        } catch(e) {
            console.error("Audio initialization failed:", e);
        }

        const LANE_WIDTH = 384;       
        const START_TOP = -160;       
        const GOAL_TOP = 780;         
        const TOTAL_DURATION = 30000;  

        let bomberAnimationFrameToken = null;
        let bomberStartTime = null;
        let bomberCurrentStatus = 'idle';
        let localBuzzerCount = 0;

        function tickBomberDrop(timestamp) {
            if (bomberCurrentStatus !== 'playing') return;

            if (!bomberStartTime) bomberStartTime = timestamp;
            const elapsed = timestamp - bomberStartTime;
            const progress = Math.min(elapsed / TOTAL_DURATION, 1);
            
            const currentTop = START_TOP + (GOAL_TOP - START_TOP) * progress;
            bombActor.style.top = `${currentTop}px`;

            if (progress < 1) {
                bomberAnimationFrameToken = requestAnimationFrame(tickDropHelper);
            } else {
                bomberCurrentStatus = 'timeup';
            }
        }
        
        function tickDropHelper(ts) { tickBomberDrop(ts); }

        activeTitle.on('change', (newVal) => {
            if (newVal && newVal.trim() !== '') {
                textBottomCategory.innerText = newVal;
                textBottomCategory.style.display = 'block';
            } else {
                textBottomCategory.style.display = 'none';
            }
        });

        activeAnswer.on('change', (newVal) => {
            if (newVal && newVal.trim() !== '') {
                textTopItem.innerText = `🟢 正解: ${newVal}`;
                textTopContainer.style.display = 'flex'; 

                const charCount = textTopItem.innerText.length;
                if (charCount > 18) {
                    const calculatedSize = Math.max(20, 40 - (charCount - 18) * 1.2);
                    textTopItem.style.fontSize = `${calculatedSize}px`;
                } else {
                    textTopItem.style.fontSize = '40px'; 
                }

                if (bomberCurrentStatus === 'playing' && soundCorrect) {
                    soundCorrect.currentTime = 0;
                    soundCorrect.play().catch(e => console.log("Audio play blocked:", e));
                }
            } else {
                textTopContainer.style.display = 'none';
            }
        });

        bomberRep.on('change', (newVal) => {
            if (!newVal) return;

            if (newVal.buzzerTrigger !== undefined && newVal.buzzerTrigger > localBuzzerCount) {
                localBuzzerCount = newVal.buzzerTrigger;
                if (soundBuzzer) {
                    soundBuzzer.currentTime = 0;
                    soundBuzzer.play().catch(e => console.log("Buzzer play blocked:", e));
                }
            }

            for (let i = 0; i < 5; i++) {
                const laneEl = document.getElementById(`lane-${i}`);
                if (laneEl) {
                    if (i < newVal.count) {
                        laneEl.classList.add('is-active');
                    } else {
                        laneEl.classList.remove('is-active');
                    }
                }
            }

            const targetLaneIdx = Math.min(newVal.count, 4);
            bombActor.style.left = `${targetLaneIdx * LANE_WIDTH}px`;

            if (newVal.status === 'playing' && bomberCurrentStatus !== 'playing') {
                bomberCurrentStatus = 'playing';
                bomberStartTime = null; 
                localBuzzerCount = newVal.buzzerTrigger || 0;
                
                if (soundClear) { soundClear.pause(); soundClear.currentTime = 0; }
                if (soundBgm) {
                    soundBgm.currentTime = 0;
                    soundBgm.play().catch(e => console.log("BGM Play Blocked:", e));
                }

                if (bomberAnimationFrameToken) cancelAnimationFrame(bomberAnimationFrameToken);
                bomberAnimationFrameToken = requestAnimationFrame(tickDropHelper);
            }

            if (newVal.status === 'cleared' && bomberCurrentStatus === 'playing') {
                bomberCurrentStatus = 'cleared';
                if (bomberAnimationFrameToken) cancelAnimationFrame(bomberAnimationFrameToken); 

                if (soundBgm) soundBgm.pause(); 
                if (soundClear) {
                    soundClear.currentTime = 0;
                    soundClear.play().catch(e => console.log("Clear Sound Blocked:", e));
                }
            }

            if (newVal.status === 'idle') {
                bomberCurrentStatus = 'idle';
                if (bomberAnimationFrameToken) cancelAnimationFrame(bomberAnimationFrameToken);
                bomberStartTime = null;
                localBuzzerCount = 0;

                if (soundBgm) { soundBgm.pause(); soundBgm.currentTime = 0; }
                if (soundClear) { soundClear.pause(); soundClear.currentTime = 0; }
                if (soundBuzzer) { soundBuzzer.pause(); soundBuzzer.currentTime = 0; }

                bombActor.style.top = `${START_TOP}px`;
                bombActor.style.left = `0px`;
            }
        });
    </script>
</body>
</html>

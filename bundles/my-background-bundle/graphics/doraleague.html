<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>DoraLeague - 5 Bomber Layout Adjusted</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 画面を均等に5分割するレーンシステム */
        .bomber-stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            display: flex;
            z-index: 5;
            pointer-events: none;
        }

        .bomber-lane {
            flex: 1;
            height: 100%;
            border-right: 4px dashed rgba(255, 255, 255, 0.15);
            box-sizing: border-box;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            /* 🔴 【変更】ステータスラインのパディングを減らし、爆弾の新しい着地目標に合わせます */
            padding-bottom: 240px; 
            transition: all 0.3s ease;
        }
        .bomber-lane:last-child { border-right: none; }

        /* 1人目〜5人目のステータス表示枠 */
        .lane-status-text {
            font-size: 38px;
            font-weight: 900;
            color: #757575; 
            background: rgba(30, 30, 30, 0.85);
            padding: 12px 40px;
            border-radius: 6px;
            border: 3px solid #616161;
            text-shadow: 0 4px 6px rgba(0,0,0,0.6);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 6;
        }

        /* 累計正解数に到達したレーンの発光スタイル */
        .bomber-lane.is-active .lane-status-text {
            color: #00ff66; 
            background: rgba(0, 60, 20, 0.9);
            border-color: #00ff66;
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.6);
            transform: scale(1.05);
        }

        /* 🔴 【変更】レーン最下部のゴール境界線を上に引き上げ（1080px - 140px = 940px地点へ） */
        .lane-goal {
            position: absolute;
            bottom: 140px; 
            left: 0;
            width: 100%;
            height: 8px;
            background: rgba(255, 23, 72, 0.4);
            box-shadow: 0 0 10px rgba(255, 23, 72, 0.5);
        }

        /* 💣 ロックボムの制御コンテナ */
        .bomb-container {
            position: absolute;
            top: -160px; 
            left: 0px; 
            width: 384px; 
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 15;
            pointer-events: none;
            transition: left 0.5s cubic-bezier(0.25, 1, 0.5, 1), top 0.1s linear;
        }

        .bomb-img {
            width: 160px;
            height: 160px;
            object-fit: contain;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.6));
        }

        /* =================================================================
           テロップ表示エリア（中央スペースを広く使うための新レイアウト）
           ================================================================= */
        /* 🔴 【変更】直近の正解キーワード：中央より少し下、爆弾の真下の空きスペースへジャスト配置 */
        .info-top-container {
            position: absolute;
            bottom: 20px; /* カテゴリ選択の上 */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 35, 126, 0.95); 
            border: 3px solid #2979ff;
            padding: 14px 50px;
            border-radius: 8px;
            color: #ffffff;
            font-size: 40px; /* 文字を少し大きく */
            font-weight: bold;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 20;
            min-width: 500px;
            text-align: center;
            display: none; 
        }

        /* 🔴 【変更】カテゴリ選択：画面の最下部（bottom: 40px）に固定してベースを安定化 */
        .info-bottom-container {
            position: absolute;
            bottom: 140px; /* 1人目〜5人目のすぐ下にピタッと配置 */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(198, 40, 40, 0.95); 
            border: 3px solid #ff1744;
            padding: 12px 60px;
            border-radius: 50px; 
            color: #ffffff;
            font-size: 44px;
            font-weight: 900;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 20;
            min-width: 550px;
            text-align: center;
            letter-spacing: 2px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="bomber-stage">
        <div class="bomber-lane" id="lane-0"><div class="lane-status-text">1人目</div><div class="lane-goal"></div></div>
        <div class="bomber-lane" id="lane-1"><div class="lane-status-text">2人目</div><div class="lane-goal"></div></div>
        <div class="bomber-lane" id="lane-2"><div class="lane-status-text">3人目</div><div class="lane-goal"></div></div>
        <div class="bomber-lane" id="lane-3"><div class="lane-status-text">4人目</div><div class="lane-goal"></div></div>
        <div class="bomber-lane" id="lane-4"><div class="lane-status-text">5人目</div><div class="lane-goal"></div></div>
    </div>

    <div class="bomb-container" id="bomb-actor">
        <img src="rockbomb.webp" class="bomb-img" alt="bomb">
    </div>

    <div class="info-top-container" id="text-top-item">---</div>
    <div class="info-bottom-container" id="text-bottom-category">---</div>

    <script>
        const bomberRep = nodecg.Replicant('fiveBomberState', { defaultValue: { status: 'idle', count: 0 } });
        
        const activeTitle = nodecg.Replicant('activeTitle', { defaultValue: '' });
        const activeAnswer = nodecg.Replicant('activeAnswer', { defaultValue: '' });
        const checkedItems = nodecg.Replicant('checkedItems', { defaultValue: [] });
        
        const bombActor = document.getElementById('bomb-actor');
        const textTopItem = document.getElementById('text-top-item');
        const textBottomCategory = document.getElementById('text-bottom-category');
        
        const soundBgm = new Audio('sounds/bgm.mp3');
        const soundClear = new Audio('sounds/clear.mp3');
        const soundCorrect = new Audio('sounds/correct.mp3'); 
        soundBgm.loop = true;

        const LANE_WIDTH = 384;       
        const START_TOP = -160;       
        
        // 🔴 【変更】動ききる底面の高さを「930px」から「780px」へ引き上げ（150px分、完全に上空へシフト）
        const GOAL_TOP = 780;         
        const TOTAL_DURATION = 30000;  

        let bomberAnimationFrameToken = null;
        let bomberStartTime = null;
        let bomberCurrentStatus = 'idle';

        // 30秒の滑らかな落下制御
        function tickBomberDrop(timestamp) {
            if (bomberCurrentStatus !== 'playing') return;

            if (!bomberStartTime) bomberStartTime = timestamp;
            const elapsed = timestamp - bomberStartTime;
            const progress = Math.min(elapsed / TOTAL_DURATION, 1);
            
            const currentTop = START_TOP + (GOAL_TOP - START_TOP) * progress;
            bombActor.style.top = `${currentTop}px`;

            if (progress < 1) {
                bomberAnimationFrameToken = requestAnimationFrame(tickBomberDrop);
            } else {
                bomberCurrentStatus = 'timeup';

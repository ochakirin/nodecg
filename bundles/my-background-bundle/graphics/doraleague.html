<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>DoraLeague - 5 Bomber Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            background: transparent; /* OBS透過用 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 🔴 画面を均等に5分割するレーンシステム */
        .bomber-stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            display: flex;
            z-index: 5;
            pointer-events: none;
        }

        .bomber-lane {
            flex: 1;
            height: 100%;
            border-right: 4px dashed rgba(255, 255, 255, 0.15); /* レーン境界線を見やすく */
            box-sizing: border-box;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* 下詰めで配置 */
            align-items: center;
            padding-bottom: 80px; /* 下部からの浮かせ具合 */
        }
        .bomber-lane:last-child { border-right: none; }

        /* 🔴 【新設】各レーンの回答状態を表示するテキスト枠 */
        .lane-status-text {
            font-size: 42px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.3); /* 初期状態（未クリア）は薄い白 */
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 30px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            z-index: 6;
        }

        /* 🔴 正解チェックが入った時のリッチな装飾変化 */
        .bomber-lane.is-cleared .lane-status-text {
            color: #00ff66; /* 鮮やかなクリアグリーン */
            background: rgba(0, 230, 118, 0.25);
            border-color: #00ff66;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
            transform: scale(1.1); /* 少し大きくして目立たせる */
        }

        /* レーン最下部のゴール境界線 */
        .lane-goal {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20px;
            background: rgba(255, 23, 72, 0.2);
        }

        /* 💣 ロックボムの制御コンテナ */
        .bomb-container {
            position: absolute;
            top: -150px; /* 初期位置：画面外の上空 */
            left: 0px; 
            width: 384px; /* 1920px / 5レーン = 384px */
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 15;
            pointer-events: none;
            transition: left 0.5s cubic-bezier(0.25, 1, 0.5, 1), top 0.1s linear;
        }

        .bomb-img {
            width: 150px; /* 爆弾を少し大きくアピール */
            height: 150px;
            object-fit: contain;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.6));
        }
    </style>
</head>
<body>

    <div class="bomber-stage">
        <div class="bomber-lane" id="lane-0"><div class="lane-status-text">問 1</div><div class="lane-goal"></div></div>
        <div class="bomber-lane" id="lane-1"><div class="lane-status-text">問 2</div><div class="lane-goal"></div></div>
        <div class="bomber-lane" id="lane-2"><div class="lane-status-text">問 3</div><div class="lane-goal"></div></div>
        <div class="bomber-lane" id="lane-3"><div class="lane-status-text">問 4</div><div class="lane-goal"></div></div>
        <div class="bomber-lane" id="lane-4"><div class="lane-status-text">問 5</div><div class="lane-goal"></div></div>
    </div>

    <div class="bomb-container" id="bomb-actor">
        <img src="rockbomb.webp" class="bomb-img" alt="bomb">
    </div>

    <script>
        // 5ボンバー専用のReplicantのみを監視
        const bomberRep = nodecg.Replicant('fiveBomberState', { 
            defaultValue: { status: 'idle', count: 0, checks: [false, false, false, false, false] } 
        });
        
        const bombActor = document.getElementById('bomb-actor');
        
        // 音声アセット定義
        const soundBgm = new Audio('sounds/bgm.mp3');
        const soundClear = new Audio('sounds/clear.mp3');
        soundBgm.loop = true;

        // 5ボンバー位置計算用
        const LANE_WIDTH = 384;       // 1920 / 5
        const START_TOP = -150;       // 上空初期位置
        const GOAL_TOP = 930;         // 最下部着地位置 (1080 - 150)
        const TOTAL_DURATION = 30000;  // 30秒制限時間

        let bomberAnimationFrameToken = null;
        let bomberStartTime = null;
        let bomberCurrentStatus = 'idle';

        // 30秒の滑らかな落下制御を行う関数
        function tickBomberDrop(timestamp) {
            if (bomberCurrentStatus !== 'playing') return;

            if (!bomberStartTime) bomberStartTime = timestamp;
            const elapsed = timestamp - bomberStartTime;
            const progress = Math.min(elapsed / TOTAL_DURATION, 1);
            
            const currentTop = START_TOP + (GOAL_TOP - START_TOP) * progress;
            bombActor.style.top = `${currentTop}px`;

            if (progress < 1) {
                bomberAnimationFrameToken = requestAnimationFrame(tickBomberDrop);
            } else {
                // 30秒経過（タイムアップ）
                bomberCurrentStatus = 'timeup';
                soundBgm.pause();
            }
        }

        // コントローラー・回答入力側からの状態変化をリアルタイム検知
        bomberRep.on('change', (newVal) => {
            if (!newVal) return;

            // 🔴 1. 過去のチェック内容（5つの問題のクリア状況）を画面の各レーンへ表示連動
            for (let i = 0; i < 5; i++) {
                const laneEl = document.getElementById(`lane-${i}`);
                const textEl = laneEl.querySelector('.lane-status-text');
                
                if (newVal.checks[i]) {
                    // チェックが入っている（正解・クリア時）
                    laneEl.classList.add('is-cleared');
                    textEl.innerText = `問 ${i + 1} CLEAR!`;
                } else {
                    // チェックが入っていない（未回答時）
                    laneEl.classList.remove('is-cleared');
                    textEl.innerText = `問 ${i + 1}`;
                }
            }

            // 🔴 2. 正解チェック数（0〜5）に基づくレーン位置（X軸）の動的スライド
            // 5問正解しても画像は5つ目のレーン（インデックス4）の位置に留める
            const targetLaneIdx = Math.min(newVal.count, 4);
            bombActor.style.left = `${targetLaneIdx * LANE_WIDTH}px`;

            // 🔴 3. ゲーム運行ステータスによる音響・アニメーション制御
            
            // 【スタートボタンが押されたとき】
            if (newVal.status === 'playing' && bomberCurrentStatus !== 'playing') {
                bomberCurrentStatus = 'playing';
                bomberStartTime = null; 
                
                soundClear.pause();
                soundClear.currentTime = 0;
                soundBgm.currentTime = 0;
                soundBgm.play().catch(e => console.log("BGM Play Blocked:", e));

                bomberAnimationFrameToken = requestAnimationFrame(tickBomberDrop);
            }

            // 【累計5チェック（クリア）を達成したとき】
            if (newVal.status === 'cleared' && bomberCurrentStatus === 'playing') {
                bomberCurrentStatus = 'cleared';
                cancelAnimationFrame(bomberAnimationFrameToken); // 爆弾をその場にピタッと静止

                soundBgm.pause();
                soundClear.currentTime = 0;
                soundClear.play().catch(e => console.log("Clear Sound Play Blocked:", e));
            }

            // 【リセットボタンが押されたとき】
            if (newVal.status === 'idle') {
                bomberCurrentStatus = 'idle';
                cancelAnimationFrame(bomberAnimationFrameToken);
                bomberStartTime = null;

                soundBgm.pause();
                soundBgm.currentTime = 0;
                soundClear.pause();
                soundClear.currentTime = 0;

                bombActor.style.top = `${START_TOP}px`;
                bombActor.style.left = `0px`;
            }
        });
    </script>
</body>
</html>

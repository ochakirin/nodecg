<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Owarema-ten Overlay</title>
    <style>
        body { margin: 0; padding: 0; width: 1920px; height: 1080px; background: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; position: relative; }
        
        .title-area { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.85); color: white; padding: 15px 50px; border-radius: 12px; font-size: 40px; font-weight: bold; border: 4px solid #ff9800; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 100; }

        .total-score-area { position: absolute; top: 35px; right: 50px; background: #fff3e0; color: #e65100; padding: 12px 30px; border-radius: 12px; font-size: 32px; font-weight: 900; border: 4px solid #ff9800; box-shadow: 0 8px 16px rgba(0,0,0,0.3); z-index: 100; display: flex; align-items: center; gap: 15px; }
        .score-val { font-size: 48px; color: #d84315; }

        .theme-area { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.95); color: #111; padding: 12px 60px; border-radius: 50px; font-size: 40px; font-weight: 900; border: 6px solid #e91e63; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; min-width: 800px; white-space: nowrap; display: none; }

        .stage-container { position: absolute; top: 130px; left: 40px; right: 40px; bottom: 120px; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
        .row { display: flex; justify-content: center; gap: 15px; width: 100%; }

        .answer-slot { background: #1e1e1e; border: 5px solid #424242; border-radius: 14px; display: flex; flex-direction: column; align-items: center; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.6); overflow: hidden; transition: all 0.3s ease; }
        .player-name { background: #333333; color: white; width: 100%; text-align: center; font-weight: bold; border-bottom: 3px solid #424242; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; z-index: 20; padding: 8px 0; transition: all 0.3s ease; }
        
        .board-area { flex: 1; width: 100%; display: flex; justify-content: center; align-items: center; background: #111; position: relative; padding: 10px; box-sizing: border-box; min-height: 0; overflow: hidden; transition: all 0.3s ease; }
        .answer-img { width: 100%; height: 100%; object-fit: contain; display: none; z-index: 5; position: relative; } 

        .cover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #cfd8dc; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #78909c; transition: all 0.3s ease; text-align: center; padding: 10px; box-sizing: border-box; z-index: 10; }
        .cover.submitted { background: #e91e63; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        
        .is-open .cover { opacity: 0; pointer-events: none; }
        .is-open .answer-img { display: block; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2); }

        .row-1 .answer-slot { width: 520px; height: 290px; border-color: #ff9800; }
        .row-1 .player-name { font-size: 28px; padding: 10px 0; background: #222; }
        .row-1 .cover { font-size: 30px; }

        .row-2 .answer-slot, .row-3 .answer-slot { width: 380px; height: 215px; }
        .row-2 .player-name, .row-3 .player-name { font-size: 22px; }
        .row-2 .cover, .row-3 .cover { font-size: 22px; }

        /* 🔴 新設：正解時の赤背景エフェクト（優先度を上げるために!importantを使用） */
        .answer-slot.is-correct {
            border-color: #ff1744 !important;
            box-shadow: 0 10px 40px rgba(255, 23, 68, 0.8) !important;
            transform: scale(1.02);
            z-index: 50;
        }
        .answer-slot.is-correct .player-name {
            background: #d32f2f !important;
            color: #ffffff !important;
            border-bottom-color: #ff1744 !important;
        }
        .answer-slot.is-correct .board-area {
            background: rgba(255, 23, 68, 0.25) !important;
        }

        @keyframes popIn {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="title-area">リーダー理解度王選手権</div>

    <div class="total-score-area">
        現在の点数: <span class="score-val" id="total-score-display">0</span> 点
    </div>

    <div class="stage-container">
        <div class="row row-1" id="row-1"></div>
        <div class="row row-2" id="row-2"></div>
        <div class="row row-3" id="row-3"></div>
    </div>

    <div class="theme-area" id="theme-display">お題：未設定</div>

    <script>
        const gameRep = nodecg.Replicant('owarematenState', {
            defaultValue: { answers: ['', '', '', '', '', '', ''], isOpen: [false, false, false, false, false, false, false], names: ['', '', '', '', '', '', ''], totalScore: 0, theme: '', isCorrect: [false, false, false, false, false, false, false] }
        });
        
        const row1 = document.getElementById('row-1');
        const row2 = document.getElementById('row-2');
        const row3 = document.getElementById('row-3');
        const totalScoreDisplay = document.getElementById('total-score-display');
        const themeDisplay = document.getElementById('theme-display');

        for (let i = 0; i < 7; i++) {
            const slot = document.createElement('div');
            slot.className = 'answer-slot';
            slot.id = `slot-${i}`;
            slot.innerHTML = `
                <div class="player-name" id="name-tag-${i}">${i + 1}人目</div>
                <div class="board-area">
                    <img class="answer-img" id="img-${i}" src="" alt="">
                    <div class="cover" id="cover-${i}">考え中...</div>
                </div>
            `;

            if (i === 0) row1.appendChild(slot);
            else if (i >= 1 && i <= 4) row2.appendChild(slot);
            else row3.appendChild(slot);
        }

        gameRep.on('change', (newVal) => {
            if (!newVal) return;

            if (newVal.totalScore !== undefined) {
                totalScoreDisplay.innerText = newVal.totalScore;
            }

            if (newVal.theme && newVal.theme.trim() !== '') {
                themeDisplay.innerText = `お題：${newVal.theme}`;
                themeDisplay.style.display = 'block';
            } else {
                themeDisplay.style.display = 'none';
            }

            for (let i = 0; i < 7; i++) {
                const slot = document.getElementById(`slot-${i}`);
                const cover = document.getElementById(`cover-${i}`);
                const img = document.getElementById(`img-${i}`);
                const nameTag = document.getElementById(`name-tag-${i}`);

                if (newVal.names && newVal.names[i] && newVal.names[i].trim() !== '') {
                    nameTag.innerText = newVal.names[i].trim();
                } else {
                    nameTag.innerText = `${i + 1}人目`;
                }

                if (newVal.answers && newVal.answers[i] !== '') {
                    img.src = newVal.answers[i];
                    cover.innerText = "回答完了！";
                    cover.classList.add('submitted');
                } else {
                    img.src = "";
                    cover.innerText = "考え中...";
                    cover.classList.remove('submitted');
                }

                if (newVal.isOpen && newVal.isOpen[i] && newVal.answers && newVal.answers[i] !== '') {
                    slot.classList.add('is-open');
                } else {
                    slot.classList.remove('is-open');
                }

                // 🔴 新設：赤背景のクラスを付け外しする
                if (newVal.isCorrect && newVal.isCorrect[i]) {
                    slot.classList.add('is-correct');
                } else {
                    slot.classList.remove('is-correct');
                }
            }
        });
    </script>
</body>
</html>

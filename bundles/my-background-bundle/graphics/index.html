<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Background & Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="background-container"></div>
    <div id="timer-display">00:00:00</div>

    <script>
        const timerRep = nodecg.Replicant('streamTimer');
        
        timerRep.on('change', (newVal) => {
            if (newVal) {
                // グラフィックス側でも hh:mm:ss にフォーマット
                const hrs = Math.floor(newVal.seconds / 3600).toString().padStart(2, '0');
                const mins = Math.floor((newVal.seconds % 3600) / 60).toString().padStart(2, '0');
                const secs = (newVal.seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').innerText = `${hrs}:${mins}:${secs}`;
            }
        });
    </script>
</body>
</html>

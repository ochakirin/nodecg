<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Kakuzuke Overlay</title>
    <style>
        body { margin: 0; padding: 0; width: 1920px; height: 1080px; background: transparent; font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; overflow: hidden; }
        
        .layout-container { display: flex; flex-direction: column; gap: 20px; padding: 40px; height: 100%; box-sizing: border-box; }

        /* 各ランクの行 */
        .rank-row { display: flex; align-items: center; background: rgba(0, 0, 0, 0.7); border-radius: 12px; border: 3px solid #b71c1c; height: 140px; padding: 0 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        /* 左側のランク名表示 */
        .rank-title { font-size: 42px; font-weight: 900; color: #fff; width: 220px; text-align: center; border-right: 3px solid rgba(255,255,255,0.3); padding-right: 20px; margin-right: 20px; flex-shrink: 0; text-shadow: 2px 2px 4px #000; }
        
        /* 札が入るエリア */
        .tags-container { display: flex; gap: 15px; flex: 1; height: 100%; align-items: center; position: relative; }

        /* 名前札のデザイン */
        .team-tag { background: linear-gradient(135deg, #ffd54f, #ffb300); color: #3e2723; font-size: 32px; font-weight: bold; padding: 15px 30px; border-radius: 8px; border: 4px solid #fff; box-shadow: 0 8px 15px rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; white-space: nowrap; min-width: 150px; z-index: 10; }
        
        /* ニフラム（消滅）時の見た目 */
        .nifuram .team-tag { background: #424242; color: #9e9e9e; border-color: #616161; opacity: 0.5; box-shadow: none; }
        .nifuram .rank-title { color: #757575; border-color: #424242; }
        .nifuram { border-color: #424242; background: rgba(0, 0, 0, 0.9); }
    </style>
</head>
<body>

    <div class="layout-container">
        <!-- ランク0: 一流 -->
        <div class="rank-row" id="row-0">
            <div class="rank-title" style="color:#ffeb3b;">✨ 一流</div>
            <div class="tags-container" id="container-0"></div>
        </div>
        <!-- ランク1: 普通 -->
        <div class="rank-row" id="row-1">
            <div class="rank-title">普通</div>
            <div class="tags-container" id="container-1"></div>
        </div>
        <!-- ランク2: 二流 -->
        <div class="rank-row" id="row-2">
            <div class="rank-title">二流</div>
            <div class="tags-container" id="container-2"></div>
        </div>
        <!-- ランク3: 三流 -->
        <div class="rank-row" id="row-3">
            <div class="rank-title" style="color:#2196f3;">三流</div>
            <div class="tags-container" id="container-3"></div>
        </div>
        <!-- ランク4: マネマネ -->
        <div class="rank-row" id="row-4">
            <div class="rank-title" style="color:#ff9800;">マネマネ</div>
            <div class="tags-container" id="container-4"></div>
        </div>
        <!-- ランク5: ニフラム -->
        <div class="rank-row nifuram" id="row-5">
            <div class="rank-title">ニフラム</div>
            <div class="tags-container" id="container-5"></div>
        </div>
    </div>

    <!-- チーム札のDOMを準備 -->
    <div id="hidden-tags" style="display: none;">
        <div class="team-tag" id="tag-0">チーム1</div>
        <div class="team-tag" id="tag-1">チーム2</div>
        <div class="team-tag" id="tag-2">チーム3</div>
        <div class="team-tag" id="tag-3">チーム4</div>
        <div class="team-tag" id="tag-4">チーム5</div>
        <div class="team-tag" id="tag-5">チーム6</div>
    </div>

    <script>
        const stateRep = nodecg.Replicant('kakuzukeState');
        
        // 移動効果音のロード（絶対パスで指定）
        let slideSound;
        try { slideSound = new Audio('/bundles/my-background-bundle/graphics/sounds/slide.mp3'); } catch(e) {}

        // コントローラーの「一斉反映」ボタンが押された時の音再生
        nodecg.listenFor('trigger_kakuzuke_move', () => {
            if (slideSound) {
                slideSound.currentTime = 0;
                slideSound.play().catch(e => console.log("音源再生エラー:", e));
            }
        });

        let currentRanks = Array(6).fill(-1);

        stateRep.on('change', (newVal) => {
            if (!newVal) return;

            // 名前を更新
            for (let i = 0; i < 6; i++) {
                const tag = document.getElementById(`tag-${i}`);
                if (newVal.names[i] && newVal.names[i].trim() !== '') {
                    tag.innerText = newVal.names[i];
                    tag.style.display = 'flex';
                } else {
                    tag.style.display = 'none';
                }
            }

            // 初回ロード時はアニメーションなしで配置
            if (currentRanks[0] === -1) {
                for (let i = 0; i < 6; i++) {
                    const container = document.getElementById(`container-${newVal.ranks[i]}`);
                    container.appendChild(document.getElementById(`tag-${i}`));
                    currentRanks[i] = newVal.ranks[i];
                }
                return;
            }

            // ランク変動があるかチェック
            let hasChanged = false;
            for (let i = 0; i < 6; i++) {
                if (currentRanks[i] !== newVal.ranks[i]) hasChanged = true;
            }

            if (hasChanged) {
                // FLIPアニメーション開始
                
                // 1. First (移動前の座標を取得)
                const firstRects = {};
                for (let i = 0; i < 6; i++) {
                    firstRects[i] = document.getElementById(`tag-${i}`).getBoundingClientRect();
                }

                // 2. DOMの移動（新しいランクのコンテナへ）
                for (let i = 0; i < 6; i++) {
                    const container = document.getElementById(`container-${newVal.ranks[i]}`);
                    container.appendChild(document.getElementById(`tag-${i}`));
                    currentRanks[i] = newVal.ranks[i];
                }

                // 3. Last & Invert (移動後の座標を取得し、差分を計算して元の位置に戻す)
                for (let i = 0; i < 6; i++) {
                    const tag = document.getElementById(`tag-${i}`);
                    const lastRect = tag.getBoundingClientRect();
                    const deltaX = firstRects[i].left - lastRect.left;
                    const deltaY = firstRects[i].top - lastRect.top;

                    // アニメーションを一旦切って、元の位置に瞬間移動させる
                    tag.style.transition = 'none';
                    tag.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                }

                // 強制リフロー (ブラウザに座標を認識させる)
                document.body.offsetHeight;

                // 4. Play (ゆっくりと目標位置へスライドさせる)
                for (let i = 0; i < 6; i++) {
                    const tag = document.getElementById(`tag-${i}`);
                    // 移動をもうちょっとゆっくりに (2秒かけて移動)
                    tag.style.transition = 'transform 2.0s cubic-bezier(0.25, 1, 0.5, 1)';
                    tag.style.transform = 'translate(0, 0)';
                }
            }
        });
    </script>
</body>
</html>

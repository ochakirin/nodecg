<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Kakuzuke Overlay</title>
    <style>
        body { 
            margin: 0; padding: 0; width: 1920px; height: 1080px; 
            background: transparent; 
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; 
            overflow: hidden; display: flex; justify-content: center; align-items: center; 
        }
        
        #table-container { position: relative; background-color: #ffff00; padding: 0; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .rating-table { border-collapse: collapse; border: 6px solid #ff0000; width: 1700px; height: 950px; table-layout: fixed; }
        .rating-table th, .rating-table td { border: 3px solid #ff0000; text-align: center; vertical-align: middle; padding: 0; }
        .rating-table th { height: 120px; font-size: 38px; font-weight: 900; line-height: 1.2; }

        .h-0 { background-color: #ffff00; color: #000; } 
        .h-1 { background-color: #ffffff; color: #000; } 
        .h-2 { background-color: #00ffff; color: #000; } 
        .h-3 { background-color: #ff00ff; color: #000; } 
        .h-4 { background-color: #b0bec5; color: #000; } 
        .h-5 { background-color: #ffffff; color: #000; } 

        #players-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

        .nameplate-wrapper {
            position: absolute; top: 0; left: 0; display: flex; justify-content: center; align-items: center;
            /* 初回ロード時はJS側でこれを無効化し、瞬間移動させます */
            transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1); 
        }

        .nameplate {
            background-color: #ffffff; border: 4px solid #0000ff; color: #000000;
            font-size: 32px; font-weight: bold; padding: 10px 15px; width: 85%;
            box-sizing: border-box; box-shadow: 2px 4px 6px rgba(0,0,0,0.3);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center;
        }

        .is-nifram .nameplate { opacity: 0.4; filter: grayscale(100%); box-shadow: none; border-color: #999; }
    </style>
</head>
<body>

    <audio id="slide-se" src="sounds/slide.mp3" preload="auto"></audio>

    <div id="table-container">
        <table class="rating-table" id="bg-table">
            <thead>
                <tr>
                    <th class="h-0">一流<br>プレイヤー</th>
                    <th class="h-1">普通<br>プレイヤー</th>
                    <th class="h-2">二流<br>プレイヤー</th>
                    <th class="h-3">三流<br>プレイヤー</th>
                    <th class="h-4">マネマネ</th>
                    <th class="h-5">ニフラム</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
        <div id="players-layer"></div>
    </div>

    <script>
        const stateRep = nodecg.Replicant('kakuzukeState');
        const soundRep = nodecg.Replicant('soundSettings', { defaultValue: { seVolume: 0.5, bgmVolume: 0.5 } });
        
        const defaultNames = ["せん", "御茶麒麟", "hamaguchi伝助", "ようぶん", "Maru", "使いこなし鯛", "すする"];
        const tbody = document.getElementById('table-body');
        const playersLayer = document.getElementById('players-layer');

        // 🔴 音声再生の指示が来たら、HTML上のAudio要素を再生する
        nodecg.listenFor('trigger_kakuzuke_move', () => {
            const seElement = document.getElementById('slide-se');
            if (seElement) {
                seElement.volume = soundRep.value ? soundRep.value.seVolume : 0.5;
                seElement.currentTime = 0;
                seElement.play().catch(e => console.error('音声の再生に失敗しました:', e));
            }
        });

        for (let i = 0; i < 7; i++) {
            const tr = document.createElement('tr');
            for (let j = 0; j < 6; j++) {
                const td = document.createElement('td');
                td.id = `cell-${i}-${j}`; 
                tr.appendChild(td);
            }
            tbody.appendChild(tr);

            const wrapper = document.createElement('div');
            wrapper.className = 'nameplate-wrapper';
            wrapper.id = `wrapper-${i}`;
            wrapper.innerHTML = `<div class="nameplate" id="name-${i}"></div>`;
            playersLayer.appendChild(wrapper);
        }

        let currentState = null;
        let isFirstLoad = true; // 🔴 初回ロード判定フラグ

        function updatePositions() {
            if (!currentState) return;
            const state = currentState;
            let needsRetry = false;

            const parentRect = document.getElementById('table-container').getBoundingClientRect();

            for (let i = 0; i < 7; i++) {
                const rank = (state.ranks && state.ranks[i] !== undefined) ? parseInt(state.ranks[i], 10) : 0;
                let nameText = (state.names && state.names[i] !== undefined) ? state.names[i] : '';

                if (nameText.trim() === '') {
                    nameText = defaultNames[i] || `プレイヤー${i+1}`;
                }

                const wrapper = document.getElementById(`wrapper-${i}`);
                const nameplate = document.getElementById(`name-${i}`);
                const targetCell = document.getElementById(`cell-${i}-${rank}`);
                
                if (!wrapper || !nameplate || !targetCell) continue;

                nameplate.innerText = nameText;
                wrapper.style.opacity = '1'; 

                const cellRect = targetCell.getBoundingClientRect();
                if (cellRect.width === 0 || cellRect.height === 0) {
                    needsRetry = true;
                    continue;
                }

                const x = cellRect.left - parentRect.left;
                const y = cellRect.top - parentRect.top;

                wrapper.style.width = `${cellRect.width}px`;
                wrapper.style.height = `${cellRect.height}px`;

                // 🔴 初回ロード時（リロード直後）はアニメーションを無効にして現在位置へ瞬間移動させる
                if (isFirstLoad) {
                    wrapper.style.transition = 'none';
                } else {
                    wrapper.style.transition = 'transform 1.5s cubic-bezier(0.25, 1, 0.5, 1)';
                }

                wrapper.style.transform = `translate(${x}px, ${y}px)`;

                if (rank === 5) {
                    wrapper.classList.add('is-nifram');
                } else {
                    wrapper.classList.remove('is-nifram');
                }
            }

            if (needsRetry) {
                // 枠の準備がまだ出来ていなければ少し待ってから再挑戦
                setTimeout(updatePositions, 50);
            } else if (isFirstLoad) {
                // 全員の配置が完了したら、次回以降はアニメーションを有効にするためフラグを折る
                setTimeout(() => {
                    isFirstLoad = false;
                }, 100);
            }
        }

        stateRep.on('change', (newVal) => {
            if (!newVal) return;
            currentState = newVal;
            requestAnimationFrame(updatePositions);
        });

        window.addEventListener('resize', updatePositions);
        window.addEventListener('load', updatePositions);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>格付け結果ビュー</title>
    <style>
        body {
            margin: 0; padding: 0; width: 1920px; height: 1080px;
            background: transparent; /* OBS上では透明 */
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            display: flex; justify-content: center; align-items: flex-end; padding-bottom: 50px;
        }

        .board {
            display: flex; gap: 20px;
        }

        .team-plate {
            width: 250px; height: 350px;
            background: rgba(0, 0, 0, 0.85);
            border: 4px solid #fff;
            border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        /* ランクダウン時のアニメーション */
        .rank-down-anim {
            animation: dropShake 0.6s ease-in-out;
        }
        @keyframes dropShake {
            0% { transform: translateY(0); }
            20% { transform: translateY(30px) rotate(3deg); }
            40% { transform: translateY(30px) rotate(-3deg); }
            60% { transform: translateY(30px) rotate(2deg); }
            80% { transform: translateY(30px) rotate(-1deg); }
            100% { transform: translateY(0); }
        }

        .team-name {
            color: #fff; font-size: 32px; font-weight: bold; margin-bottom: 20px;
            text-align: center; word-break: break-all; padding: 0 10px;
        }

        .rank-title {
            font-size: 48px; font-weight: 900;
            padding: 10px 20px; border-radius: 8px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* ランクごとのスタイル定義 */
        .rank-0 { background: linear-gradient(135deg, #ffd700, #daa520); color: #fff; border: 2px solid #fff; } /* 一流 */
        .rank-1 { background: linear-gradient(135deg, #c0c0c0, #a9a9a9); color: #fff; border: 2px solid #fff; } /* 普通 */
        .rank-2 { background: linear-gradient(135deg, #cd7f32, #8b4513); color: #fff; border: 2px solid #fff; } /* 二流 */
        .rank-3 { background: linear-gradient(135deg, #4caf50, #2e7d32); color: #fff; border: 2px solid #fff; } /* 三流 */
        .rank-4 { background: #eeeeee; color: #555; font-size: 36px; border: 2px dashed #999; } /* そっくりさん */
        
        /* 映す価値なし (画面から消える演出) */
        .rank-5 { opacity: 0; pointer-events: none; transform: translateY(100px); }

    </style>
</head>
<body>

    <div class="board" id="board">
        <!-- Javascriptで自動生成 -->
    </div>

    <script>
        const ranks = ["一流", "普通", "二流", "三流", "そっくりさん", "映す価値なし"];
        const kakuzukeRep = nodecg.Replicant('kakuzukeState');
        let previousState = [];

        kakuzukeRep.on('change', (newVal) => {
            if (!newVal) return;
            const board = document.getElementById('board');
            
            // 初回レンダリング
            if (board.children.length === 0) {
                newVal.forEach((team, idx) => {
                    const plate = document.createElement('div');
                    plate.id = `plate-${idx}`;
                    plate.className = `team-plate rank-${team.rank === 5 ? '5' : 'visible'}`;
                    if (team.rank === 5) plate.style.opacity = '0'; // 映す価値なし対応

                    plate.innerHTML = `
                        <div class="team-name" id="name-${idx}">${team.name}</div>
                        <div class="rank-title rank-${team.rank}" id="rank-${idx}">${ranks[team.rank]}</div>
                    `;
                    board.appendChild(plate);
                });
            } else {
                // 差分更新とアニメーション
                newVal.forEach((team, idx) => {
                    document.getElementById(`name-${idx}`).innerText = team.name;
                    
                    const rankEl = document.getElementById(`rank-${idx}`);
                    const plateEl = document.getElementById(`plate-${idx}`);
                    
                    if (previousState[idx] && previousState[idx].rank !== team.rank) {
                        // ランクが変わった場合
                        rankEl.className = `rank-title rank-${team.rank}`;
                        rankEl.innerText = ranks[team.rank];

                        // ランクダウン（数字が増えた）ならガクッと揺らす
                        if (team.rank > previousState[idx].rank) {
                            plateEl.classList.remove('rank-down-anim');
                            void plateEl.offsetWidth; // アニメーションのリセット用ハック
                            plateEl.classList.add('rank-down-anim');
                        }

                        // 映す価値なしの透過処理
                        if (team.rank === 5) {
                            plateEl.classList.add('rank-5');
                        } else {
                            plateEl.classList.remove('rank-5');
                        }
                    }
                });
            }
            
            // 前回の状態を保存
            previousState = JSON.parse(JSON.stringify(newVal));
        });
    </script>
</body>
</html>

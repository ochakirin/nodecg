<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Kakuzuke Board</title>
    <style>
        body { margin: 0; padding: 0; width: 1920px; height: 1080px; background: transparent; font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        .rating-table {
            width: 1700px;
            height: 950px;
            border-collapse: collapse;
            border: 6px solid #d32f2f; 
            background-color: #ffff00; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            table-layout: fixed;
            position: relative;
        }

        .rating-table th, .rating-table td { border: 2px solid #d32f2f; text-align: center; vertical-align: middle; }
        .rating-table th { height: 120px; font-size: 38px; font-weight: 900; line-height: 1.2; letter-spacing: 2px; }

        .h-0 { background-color: #ffff00; color: #000; } 
        .h-1 { background-color: #ffffff; color: #000; } 
        .h-2 { background-color: #00ffff; color: #000; } 
        .h-3 { background-color: #ff00ff; color: #000; } 
        .h-4 { background-color: #b0bec5; color: #000; } 
        .h-5 { background-color: #ffffff; color: #000; } 

        #players-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

        .nameplate-wrapper {
            position: absolute; 
            top: 0; left: 0; 
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .nameplate {
            background-color: #ffff00; border: 5px solid #1565c0; color: #000;
            font-size: 34px; font-weight: bold; padding: 10px 15px; width: 80%;
            box-sizing: border-box; box-shadow: 2px 4px 8px rgba(0,0,0,0.3);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center;
        }

        .is-nifram .nameplate { opacity: 0.3; filter: grayscale(100%); box-shadow: none; }
    </style>
</head>
<body>

    <div style="position: relative;">
        <table class="rating-table" id="bg-table">
            <thead>
                <tr>
                    <th class="h-0">一流<br>プレイヤー</th><th class="h-1">普通<br>プレイヤー</th>
                    <th class="h-2">二流<br>プレイヤー</th><th class="h-3">三流<br>プレイヤー</th>
                    <th class="h-4">マネマネ</th><th class="h-5">ニフラム</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
        <div id="players-layer"></div>
    </div>

    <script>
        const kakuzukeRep = nodecg.Replicant('kakuzukeState', {
            defaultValue: { 
                names: ["せん", "御茶麒麟", "hamaguchi伝助", "ようぶん", "Maru", "使いこなし鯛", "すする"], 
                ranks: [0, 0, 0, 0, 0, 0, 0] 
            }
        });

        const soundRep = nodecg.Replicant('soundSettings', { defaultValue: { seVolume: 0.5, bgmVolume: 0.5 } });

        const tbody = document.getElementById('table-body');
        const playersLayer = document.getElementById('players-layer');

        let soundMove;
        try { soundMove = new Audio('sounds/open.mp3'); } catch(e) {}
        nodecg.listenFor('play_open_se', () => {
            if (soundMove) {
                soundMove.volume = soundRep.value ? soundRep.value.seVolume : 0.5;
                soundMove.currentTime = 0;
                soundMove.play().catch(e => console.log('SE Play Error:', e));
            }
        });

        for (let i = 0; i < 7; i++) {
            const tr = document.createElement('tr');
            for (let j = 0; j < 6; j++) {
                const td = document.createElement('td');
                td.id = `cell-${i}-${j}`; 
                tr.appendChild(td);
            }
            tbody.appendChild(tr);

            const wrapper = document.createElement('div');
            wrapper.className = 'nameplate-wrapper';
            wrapper.id = `player-wrapper-${i}`;
            wrapper.innerHTML = `<div class="nameplate" id="player-name-${i}"></div>`;
            playersLayer.appendChild(wrapper);
        }

        let currentState = null;

        function renderBoard() {
            if (!currentState) return;
            const names = currentState.names || [];
            const ranks = currentState.ranks || [];

            let needsRetry = false;

            for (let i = 0; i < 7; i++) {
                let rank = parseInt(ranks[i], 10);
                if (isNaN(rank)) rank = 0;

                const nameText = names[i] || `プレイヤー${i+1}`;
                
                const wrapper = document.getElementById(`player-wrapper-${i}`);
                const nameplate = document.getElementById(`player-name-${i}`);
                const targetCell = document.getElementById(`cell-${i}-${rank}`);
                
                if (!targetCell || !wrapper || !nameplate) continue;

                // 🔴 修正：画面レイアウトが完了する前であっても、名前テキストの同期は絶対に止めない
                nameplate.innerText = nameText;

                const cellWidth = targetCell.offsetWidth;
                const cellHeight = targetCell.offsetHeight;

                // 🔴 修正：計算待ちが発生した場合も「次以降のプレイヤーの処理」を中断せず、後でまとめて再計算する
                if (cellWidth === 0 || cellHeight === 0) {
                    needsRetry = true;
                    continue; 
                }

                wrapper.style.width = `${cellWidth}px`;
                wrapper.style.height = `${cellHeight}px`;
                wrapper.style.transform = `translate(${targetCell.offsetLeft}px, ${targetCell.offsetTop}px)`;

                if (rank === 5) {
                    wrapper.classList.add('is-nifram');
                } else {
                    wrapper.classList.remove('is-nifram');
                }
            }

            // サイズが0だったものがあれば、0.1秒後に再計算
            if (needsRetry) {
                setTimeout(renderBoard, 100);
            }
        }

        kakuzukeRep.on('change', (newVal) => {
            if (!newVal) return;
            currentState = newVal;
            requestAnimationFrame(renderBoard);
        });

        window.addEventListener('resize', renderBoard);
        window.addEventListener('load', renderBoard);
    </script>
</body>
</html>

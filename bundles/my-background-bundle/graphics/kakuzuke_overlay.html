<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Kakuzuke Overlay</title>
    <style>
        body { 
            margin: 0; padding: 0; width: 1920px; height: 1080px; 
            background: transparent; 
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; 
            overflow: hidden; display: flex; justify-content: center; align-items: center; 
        }
        
        /* 🔴 画像に寄せたテーブル全体の設定（赤枠・黄色背景） */
        #table-container {
            position: relative;
            background-color: #ffff00;
            padding: 0;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .rating-table {
            border-collapse: collapse;
            border: 6px solid #ff0000; /* 外側の太い赤枠 */
            width: 1700px;
            height: 950px;
            table-layout: fixed;
        }

        .rating-table th, .rating-table td {
            border: 3px solid #ff0000; /* 内側の赤枠 */
            text-align: center;
            vertical-align: middle;
            padding: 0;
        }

        .rating-table th {
            height: 120px;
            font-size: 38px;
            font-weight: 900;
            line-height: 1.2;
        }

        /* ヘッダーの色（画像に準拠） */
        .h-0 { background-color: #ffff00; color: #000; } /* 一流 (黄色) */
        .h-1 { background-color: #ffffff; color: #000; } /* 普通 (白) */
        .h-2 { background-color: #00ffff; color: #000; } /* 二流 (水色) */
        .h-3 { background-color: #ff00ff; color: #000; } /* 三流 (マゼンタ) */
        .h-4 { background-color: #b0bec5; color: #000; } /* マネマネ (グレー) */
        .h-5 { background-color: #ffffff; color: #000; } /* ニフラム (白) */

        /* 名前札が動くための絶対座標レイヤー */
        #players-layer {
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            pointer-events: none; 
            z-index: 10;
        }

        /* 移動する名前札の枠 */
        .nameplate-wrapper {
            position: absolute; 
            top: 0; left: 0; 
            display: flex; justify-content: center; align-items: center;
            /* 🔴 ここでゆっくり（1.5秒）スライド移動させる */
            transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 🔴 画像に寄せた名前札のデザイン（白背景・青枠・黒文字） */
        .nameplate {
            background-color: #ffffff; 
            border: 4px solid #0000ff; 
            color: #000000;
            font-size: 32px; 
            font-weight: bold; 
            padding: 10px 15px; 
            width: 85%;
            box-sizing: border-box; 
            box-shadow: 2px 4px 6px rgba(0,0,0,0.3);
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            text-align: center;
        }

        /* ニフラム（消滅）時の見た目 */
        .is-nifram .nameplate {
            opacity: 0.4;
            filter: grayscale(100%);
            box-shadow: none;
            border-color: #999;
        }
    </style>
</head>
<body>

    <div id="table-container">
        <table class="rating-table" id="bg-table">
            <thead>
                <tr>
                    <th class="h-0">一流<br>プレイヤー</th>
                    <th class="h-1">普通<br>プレイヤー</th>
                    <th class="h-2">二流<br>プレイヤー</th>
                    <th class="h-3">三流<br>プレイヤー</th>
                    <th class="h-4">マネマネ</th>
                    <th class="h-5">ニフラム</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
        
        <div id="players-layer"></div>
    </div>

    <script>
        const stateRep = nodecg.Replicant('kakuzukeState');
        const tbody = document.getElementById('table-body');
        const playersLayer = document.getElementById('players-layer');

        // 🔴 指定されたスライド音の読み込み
        let slideSound;
        try { slideSound = new Audio('/bundles/my-background-bundle/graphics/sounds/slide.mp3'); } catch(e) { console.error("音源エラー", e); }

        nodecg.listenFor('trigger_kakuzuke_move', () => {
            if (slideSound) {
                slideSound.currentTime = 0;
                slideSound.play().catch(e => console.log('SE Play Error:', e));
            }
        });

        // 7人分のテーブルの行（7行 × 6列）と名前札を生成
        for (let i = 0; i < 7; i++) {
            const tr = document.createElement('tr');
            for (let j = 0; j < 6; j++) {
                const td = document.createElement('td');
                td.id = `cell-${i}-${j}`; 
                tr.appendChild(td);
            }
            tbody.appendChild(tr);

            const wrapper = document.createElement('div');
            wrapper.className = 'nameplate-wrapper';
            wrapper.id = `wrapper-${i}`;
            wrapper.innerHTML = `<div class="nameplate" id="name-${i}"></div>`;
            playersLayer.appendChild(wrapper);
        }

        let currentState = null;

        function updatePositions() {
            if (!currentState) return;
            const state = currentState;
            let needsRetry = false;

            const parentRect = document.getElementById('table-container').getBoundingClientRect();

            for (let i = 0; i < 7; i++) {
                // 安全なデータ取得
                const rank = (state.ranks && state.ranks[i] !== undefined) ? parseInt(state.ranks[i], 10) : 0;
                const nameText = (state.names && state.names[i] !== undefined) ? state.names[i] : '';

                const wrapper = document.getElementById(`wrapper-${i}`);
                const nameplate = document.getElementById(`name-${i}`);
                const targetCell = document.getElementById(`cell-${i}-${rank}`);
                
                if (!wrapper || !nameplate || !targetCell) continue;

                // 名前の反映（空なら非表示）
                nameplate.innerText = nameText;
                if (nameText.trim() === '') {
                    wrapper.style.display = 'none';
                } else {
                    wrapper.style.display = 'flex';
                }

                // 座標計算
                const cellRect = targetCell.getBoundingClientRect();
                
                // 画面読み込み直後などでサイズが取れない場合は後で再計算
                if (cellRect.width === 0 || cellRect.height === 0) {
                    needsRetry = true;
                    continue;
                }

                // テーブル内での相対座標を算出
                const x = cellRect.left - parentRect.left;
                const y = cellRect.top - parentRect.top;

                wrapper.style.width = `${cellRect.width}px`;
                wrapper.style.height = `${cellRect.height}px`;
                
                // 🔴 CSSのtransitionを利用して滑らかに移動！
                wrapper.style.transform = `translate(${x}px, ${y}px)`;

                if (rank === 5) {
                    wrapper.classList.add('is-nifram');
                } else {
                    wrapper.classList.remove('is-nifram');
                }
            }

            if (needsRetry) {
                setTimeout(updatePositions, 100);
            }
        }

        stateRep.on('change', (newVal) => {
            if (!newVal) return;
            currentState = newVal;
            requestAnimationFrame(updatePositions);
        });

        // 画面リサイズ時などにもズレないよう再計算
        window.addEventListener('resize', updatePositions);
        window.addEventListener('load', updatePositions);
    </script>
</body>
</html>
